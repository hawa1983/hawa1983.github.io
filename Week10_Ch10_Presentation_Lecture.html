<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0a1628;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
:root{
  --navy:#1A3A5C;--slate:#4A6FA5;--amber:#C8840A;--green:#1B6B3A;
  --red:#B5311A;--teal:#0F6E56;--purple:#5B3FA6;
}
.deck{height:100dvh;display:grid;
  grid-template-rows:4px 5px 36px 1fr 56px;
  grid-template-areas:"topbar" "prog" "flow" "main" "nav";}
.topbar{grid-area:topbar;background:linear-gradient(90deg,#1A3A5C,#0F6E56,#C8840A)}
.prog-wrap{grid-area:prog;background:rgba(255,255,255,.08)}
#bar{display:block;height:100%;background:var(--amber);width:0;transition:width .3s ease}
.flow{grid-area:flow;display:flex;align-items:center;justify-content:center;
  gap:4px;padding:0 12px;background:rgba(0,0,0,.3);
  border-bottom:1px solid rgba(255,255,255,.08);overflow:hidden;}
.flow .fl{font-size:11px;font-weight:700;color:rgba(255,255,255,.35);
  border:1px solid rgba(255,255,255,.08);border-radius:20px;
  padding:2px 8px;white-space:nowrap;transition:all .2s;}
.flow .fl.active{background:rgba(200,132,10,.25);border-color:rgba(200,132,10,.6);color:#FFD485}
.flow .fl.done{color:rgba(255,255,255,.2)}
.flow .sep{color:rgba(255,255,255,.12);font-size:10px}
.main-area{grid-area:main;display:grid;grid-template-columns:55% 45%;
  gap:0;overflow:hidden;cursor:pointer;
  user-select:none;-webkit-user-select:none;}
.slide-left{display:flex;flex-direction:column;justify-content:center;
  padding:clamp(14px,2.8vh,32px) clamp(16px,3vw,40px);
  border-right:1px solid rgba(255,255,255,.06);overflow-y:auto;}
.slide-left::-webkit-scrollbar{width:4px}
.slide-left::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.slide-right{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:clamp(12px,2.2vh,24px) clamp(14px,2.5vw,30px);
  background:rgba(255,255,255,.025);overflow-y:auto;}
.slide-right::-webkit-scrollbar{width:4px}
.slide-right::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.sec-label{font-size:clamp(9px,.85vw,11px);font-weight:800;letter-spacing:.14em;
  text-transform:uppercase;color:var(--amber);margin-bottom:clamp(5px,.8vh,10px);}
.slide-title{font-size:clamp(20px,2.8vw,40px);font-weight:700;color:#fff;
  line-height:1.1;margin-bottom:clamp(4px,.7vh,9px);}
.slide-sub{font-size:clamp(12px,1.3vw,17px);color:rgba(255,255,255,.45);
  margin-bottom:clamp(8px,1.5vh,18px);line-height:1.4;}
.bullets{list-style:none;display:flex;flex-direction:column;gap:clamp(5px,.7vh,9px);
  margin-bottom:clamp(8px,1.2vh,16px);}
.bullets li{display:flex;gap:9px;align-items:flex-start;
  font-size:clamp(12px,1.25vw,17px);color:rgba(255,255,255,.78);line-height:1.42;}
.bullets li::before{content:"›";color:var(--amber);font-weight:700;flex-shrink:0;font-size:1.1em}
.snippets-area{display:flex;flex-direction:column;gap:clamp(6px,.9vh,10px);margin-top:clamp(6px,1vh,12px);}
.snippet{border-radius:9px;padding:clamp(8px,1.1vh,13px) clamp(11px,1.4vw,15px);
  font-size:clamp(11px,1.1vw,14px);line-height:1.55;
  opacity:0;transform:translateY(10px);
  transition:opacity .35s ease,transform .35s ease;pointer-events:none;border-left:3px solid;}
.snippet.show{opacity:1;transform:none;pointer-events:auto}
.sn-0{background:rgba(200,132,10,.12);border-color:var(--amber);color:#FFD485}
.sn-1{background:rgba(74,111,165,.12);border-color:var(--slate);color:#A8C8E8}
.sn-2{background:rgba(15,110,86,.12);border-color:var(--teal);color:#9FCC9F}
.vis-wrap{width:100%;display:flex;align-items:center;justify-content:center}
.vis-hospital{display:flex;flex-direction:column;gap:9px;width:100%}
.vis-badge{background:rgba(255,255,255,.06);border-radius:7px;padding:7px 11px;
  font-size:12px;font-weight:700;color:#A8C8E8;text-align:center;}
.vis-cards{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.vc{border-radius:9px;padding:9px 10px;text-align:center;border:1px solid}
.vc-blue{background:rgba(74,111,165,.15);border-color:rgba(74,111,165,.4)}
.vc-navy{background:rgba(26,58,92,.4);border-color:rgba(74,111,165,.3)}
.vc-teal{background:rgba(15,110,86,.15);border-color:rgba(15,110,86,.4)}
.vc-amber{background:rgba(200,132,10,.15);border-color:rgba(200,132,10,.4)}
.vc-ico{font-size:18px;margin-bottom:3px}
.vc-name{font-size:10px;font-weight:700;color:#fff}
.vc-role{font-size:9px;color:rgba(255,255,255,.4)}
.vis-event{background:rgba(15,110,86,.2);border:1px solid rgba(15,110,86,.5);
  border-radius:7px;padding:7px 10px;font-size:11px;color:#7FD4B8;
  text-align:center;font-weight:600}
.vis-tree{display:flex;flex-direction:column;align-items:center;gap:3px;width:100%}
.vrow{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;width:100%}
.vbranch{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:50px}
.vline{width:1px;min-height:12px;background:rgba(255,255,255,.18)}
.vdivider{width:80%;height:1px;background:rgba(255,255,255,.1);margin:7px 0}
.vnode{border-radius:7px;padding:7px 10px;text-align:center;
  font-size:clamp(10px,.95vw,13px);font-weight:600;border:1px solid;width:100%;line-height:1.3}
.vnode small{font-weight:400;opacity:.6;font-size:.85em}
.vn-purple{background:rgba(91,63,166,.2);border-color:rgba(109,95,188,.6);color:#C8B8FF}
.vn-blue{background:rgba(74,111,165,.2);border-color:rgba(74,111,165,.6);color:#7EC8F4}
.vn-teal{background:rgba(15,110,86,.2);border-color:rgba(15,110,86,.6);color:#7FD4B8}
.vn-amber{background:rgba(200,132,10,.15);border-color:rgba(200,132,10,.5);color:#FFD485}
.vn-green{background:rgba(27,107,58,.15);border-color:rgba(27,107,58,.5);color:#9FCC9F}
.vn-red{background:rgba(181,49,26,.15);border-color:rgba(181,49,26,.5);color:#F4A080}
.vn-muted{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12);color:rgba(255,255,255,.45)}
.vtag{display:inline-block;border-radius:10px;padding:2px 8px;
  font-size:clamp(9px,.8vw,11px);font-weight:600;margin:2px;border:1px solid}
.vtag-blue{background:rgba(74,111,165,.2);border-color:rgba(74,111,165,.4);color:#7EC8F4}
.vtag-teal{background:rgba(15,110,86,.15);border-color:rgba(15,110,86,.4);color:#7FD4B8}
.vtag-amber{background:rgba(200,132,10,.15);border-color:rgba(200,132,10,.4);color:#FFD485}
.vtag-green{background:rgba(27,107,58,.15);border-color:rgba(27,107,58,.4);color:#9FCC9F}
.vtag-red{background:rgba(181,49,26,.15);border-color:rgba(181,49,26,.4);color:#F4A080}
.vtag-muted{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);color:rgba(255,255,255,.38)}
.vis-tag-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.vis-stack{display:flex;flex-direction:column;gap:5px;width:100%}
.vs-item{border-radius:6px;padding:7px 11px;font-size:clamp(10px,.9vw,12px);
  font-weight:600;color:rgba(255,255,255,.75);border:1px solid}
.vis-code{background:#071828;border-radius:9px;padding:clamp(9px,1.3vh,14px) clamp(11px,1.3vw,15px);
  font-family:"Courier New",monospace;font-size:clamp(10px,.9vw,13px);
  line-height:1.68;color:#C0D8F0;white-space:pre;overflow-x:auto;width:100%}
.vis-code .cm{color:#3E6A8A}.vis-code .ck{color:#7EC8F4}.vis-code .co{color:#F2A623}
.vis-code .ce{color:#E87C5A}.vis-code .cv{color:#9FCC9F}.ct{color:#C8B8FF;font-weight:700}
.vis-allen{display:flex;flex-direction:column;gap:5px;width:100%}
.al-row{display:flex;align-items:center;gap:9px}
.al-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.45);min-width:58px}
.al-bars{flex:1;height:12px;position:relative;display:flex;align-items:center}
.al-b{height:9px;border-radius:3px;position:relative}
.b-blue{background:rgba(74,111,165,.65)}.b-green{background:rgba(27,107,58,.65)}
.b-amber{background:rgba(200,132,10,.3)}
.nav{grid-area:nav;display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(10px,2vw,24px);background:rgba(0,0,0,.4);
  border-top:1px solid rgba(255,255,255,.08);z-index:10;}
.nb{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);
  color:#fff;border-radius:6px;padding:clamp(5px,.9vh,8px) clamp(9px,1.3vw,16px);
  font-size:clamp(11px,.95vw,13px);font-weight:700;cursor:pointer;transition:background .15s;white-space:nowrap;}
.nb:hover{background:rgba(255,255,255,.18)}
.nb-primary{background:rgba(200,132,10,.28);border-color:rgba(200,132,10,.55);color:#FFD485}
.nb-primary:hover{background:rgba(200,132,10,.42)}
.nav-mid{text-align:center}
.nav-counter{font-size:clamp(11px,.95vw,13px);font-weight:700;color:rgba(255,255,255,.55)}
.nav-hint{font-size:clamp(9px,.8vw,11px);color:rgba(255,255,255,.28);margin-top:1px}
.overlay{position:fixed;inset:0;background:rgba(5,15,30,.88);display:none;
  align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(8px)}
.menu-box{background:#0f2035;border:1px solid rgba(255,255,255,.12);border-radius:16px;
  padding:22px;width:min(860px,90vw);max-height:84vh;overflow-y:auto}
.menu-box h2{color:#fff;margin-bottom:14px;font-size:18px}
.menu-box::-webkit-scrollbar{width:4px}
.menu-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:2px}
.jump-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:7px}
.jump-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
  border-radius:8px;padding:9px 11px;text-align:left;cursor:pointer;
  color:rgba(255,255,255,.65);font-size:11px;font-weight:600;transition:background .15s}
.jump-btn:hover{background:rgba(200,132,10,.18);border-color:rgba(200,132,10,.4);color:#FFD485}
.jump-btn small{display:block;color:rgba(255,255,255,.3);font-weight:400;margin-top:2px;font-size:10px}
@media(max-width:680px){
  .main-area{grid-template-columns:1fr;grid-template-rows:auto auto}
  .slide-right{border-top:1px solid rgba(255,255,255,.06);min-height:160px}
  .slide-left{padding:10px 14px} .slide-right{padding:10px 14px}
}
@media(max-height:580px){
  .deck{grid-template-rows:3px 4px 26px 1fr 46px}
  .slide-title{font-size:clamp(17px,2.5vw,30px)}
}

/*
 * Additional responsive tweaks for very small screens.
 * When the viewport width is narrow, stack navigation buttons and
 * allow the section flow bar to wrap or scroll horizontally.
 */
@media(max-width:480px){
  /* Allow flow labels to wrap and scroll */
  .flow{flex-wrap:wrap;justify-content:flex-start;overflow-x:auto}
  .flow .sep{display:none}
  /* Stack nav buttons vertically and expand to full width */
  .nav{flex-direction:column;align-items:stretch;gap:6px;padding:8px 12px}
  .nav > div{display:flex;flex-wrap:wrap;gap:6px}
  .nav button.nb{width:100%;flex:1;margin:2px 0}
  .nav-mid{margin-top:6px;text-align:left}
  /* Reduce padding on slides for small screens */
  .slide-left,.slide-right{padding:8px 12px}
  /* Ensure the menu box uses the full width minus margin */
  .menu-box{width:min(600px,95vw)}
}
</style>
</head>
<body>
<div class="deck">
  <div class="topbar"></div>
  <div class="prog-wrap"><span id="bar"></span></div>
  <div class="flow" id="flow"></div>
  <div class="main-area" id="mainArea" onclick="handleClick(event)">
    <div class="slide-left" id="slideLeft">
      <div class="sec-label" id="secLabel"></div>
      <div class="slide-title" id="slideTitle"></div>
      <div class="slide-sub" id="slideSub"></div>
      <ul class="bullets" id="slideBullets"></ul>
      <div class="snippets-area" id="snippets"></div>
    </div>
    <div class="slide-right" id="slideRight">
      <div class="vis-wrap" id="visWrap"></div>
    </div>
  </div>
  <footer class="nav">
    <button class="nb" onclick="event.stopPropagation();back()">← Back</button>
    <div style="display:flex;gap:7px">
      <button class="nb" onclick="event.stopPropagation();reset()" title="Reset reveals">↺ Reset</button>
      <button class="nb" onclick="event.stopPropagation();openMenu()">≡ Contents</button>
    </div>
    <div class="nav-mid">
      <div class="nav-counter" id="counter">1 / 60</div>
      <div class="nav-hint" id="hint">Click slide to reveal</div>
    </div>
    <button class="nb nb-primary" onclick="event.stopPropagation();revealOrNext()">Reveal / Next →</button>
  </footer>
</div>
<div class="overlay" id="overlay" onclick="closeMenu()">
  <div class="menu-box" onclick="event.stopPropagation()">
    <h2>📋 Jump to a slide</h2>
    <div class="jump-grid" id="jumpGrid"></div>
  </div>
</div>
<script>
const VISUALS={"hospital":"<div class=\"vis-hospital\"><div class=\"vis-badge\">🏥 Who knows what at Northgate?</div><div class=\"vis-cards\"><div class=\"vc vc-teal\"><div class=\"vc-ico\">👩‍⚕️</div><div class=\"vc-name\">Nurse Mehta</div><div class=\"vc-role\">Knows allergy flag<br>for PatientInOR3</div></div><div class=\"vc vc-navy\"><div class=\"vc-ico\">🧑‍⚕️</div><div class=\"vc-name\">Dr Okafor</div><div class=\"vc-role\">Does NOT yet know<br>allergy was updated</div></div><div class=\"vc vc-amber\"><div class=\"vc-ico\">💊</div><div class=\"vc-name\">Pharmacy</div><div class=\"vc-role\">Knows flag under<br>Maria Santos</div></div><div class=\"vc vc-blue\"><div class=\"vc-ico\">🤖</div><div class=\"vc-name\">Hospital AI</div><div class=\"vc-role\">Must track the gap<br>and trigger alert</div></div></div><div class=\"vis-event\">Safety alert = a knowledge-transfer problem</div></div>",
"ontology":"<div class=\"vis-tree\"><div class=\"vnode vn-purple\">O = (C, R, P)</div><div class=\"vrow\" style=\"margin-top:10px\"><div class=\"vbranch\"><div class=\"vline\"></div><div class=\"vnode vn-blue\">C \u2014 Concepts<br><small>Patient \u00b7 Doctor \u00b7 Room</small></div></div><div class=\"vbranch\"><div class=\"vline\"></div><div class=\"vnode vn-teal\">R \u2014 Relations<br><small>TreatedBy \u00b7 AssignedTo</small></div></div><div class=\"vbranch\"><div class=\"vline\"></div><div class=\"vnode vn-amber\">P \u2014 Properties<br><small>Age \u00b7 BloodType \u00b7 Capacity</small></div></div></div></div>",

"category":"<div class=\"vis-tree\"><div class=\"vnode vn-blue\">Category: Patients</div><div class=\"vline\"></div><div class=\"vis-tag-row\"><span class=\"vtag vtag-teal\">Maria \u2208 Patients</span><span class=\"vtag vtag-muted\">other patients...</span></div><div style=\"margin-top:14px;font-size:11px;color:rgba(255,255,255,.4);text-align:center\">The <em>category</em> has no blood type.<br>Individual patients do.</div></div>",

"conflict":"<div class=\"vis-tree\"><div class=\"vnode vn-teal\" style=\"font-size:11px\">Existing surgery<br>9am\u201311am \u00b7 OR-3</div><div style=\"margin:6px 0;text-align:center;font-size:18px;color:rgba(255,255,255,.25)\">\u2195 conflict</div><div class=\"vnode vn-red\" style=\"font-size:11px\">Proposed surgery<br>10am\u201312pm \u00b7 OR-3</div><div style=\"margin-top:10px\"><div class=\"vtag vtag-red\" style=\"display:block;text-align:center;padding:8px 12px\">Overlap detected \u2192 booking rejected \u2717</div></div></div>",
"allen":"<div class=\"vis-allen\"><div class=\"al-row\"><div class=\"al-label\">Before</div><div class=\"al-bars\"><div class=\"al-b b-blue\" style=\"width:38%\"></div><div class=\"al-b b-green\" style=\"width:38%;margin-left:8px\"></div></div></div><div class=\"al-row\"><div class=\"al-label\">Meets</div><div class=\"al-bars\"><div class=\"al-b b-blue\" style=\"width:42%\"></div><div class=\"al-b b-green\" style=\"width:42%\"></div></div></div><div class=\"al-row\"><div class=\"al-label\">Overlaps</div><div class=\"al-bars\"><div class=\"al-b b-blue\" style=\"width:48%\"></div><div class=\"al-b b-green\" style=\"width:48%;margin-left:-14%\"></div></div></div><div class=\"al-row\"><div class=\"al-label\">During</div><div class=\"al-bars\" style=\"position:relative;height:10px\"><div class=\"al-b b-amber\" style=\"width:90%;position:absolute;left:0\"></div><div class=\"al-b b-blue\" style=\"width:40%;position:absolute;left:22%\"></div></div></div><div class=\"al-row\"><div class=\"al-label\">Equals</div><div class=\"al-bars\" style=\"position:relative;height:10px\"><div class=\"al-b b-blue\" style=\"position:absolute;width:62%\"></div><div class=\"al-b b-green\" style=\"position:absolute;width:62%;opacity:.5\"></div></div></div></div>",
"reify":"<div class=\"vis-tree\"><div class=\"vnode vn-teal\" style=\"font-size:11px\">AppendectomyE1<br><small style=\"opacity:.6\">event as a first-class object</small></div><div style=\"display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:8px\"><span class=\"vtag vtag-blue\">Patient: Maria</span><span class=\"vtag vtag-blue\">Surgeon: Okafor</span><span class=\"vtag vtag-blue\">Room: OR-3</span><span class=\"vtag vtag-blue\">9am\u201311am</span><span class=\"vtag vtag-amber\">Complications: none</span></div><div style=\"margin-top:8px;font-size:10px;color:rgba(255,255,255,.35);text-align:center\">One event object \u2014 many attached facts</div></div>",
"mental":"<div class=\"vis-code\"><span class=\"cm\">// FOL fact — works fine</span>\nAllergic(Maria, Penicillin)  <span class=\"cv\">✓</span>\n\n<span class=\"cm\">// FOL belief — looks fine...</span>\n<span class=\"ck\">Knows</span>(Mehta, NoAllergy(NewAdmission))\n\n<span class=\"cm\">// FOL substitution fires:</span>\n<span class=\"cm\">// NewAdmission = MariaSantos</span>\n<span class=\"ck\">Knows</span>(Mehta, NoAllergy(<span class=\"ce\">MariaSantos</span>))\n<span class=\"ce\">✗ WRONG</span> — Mehta never heard that name\n\n<span class=\"cm\">// The fix: K operator blocks this.</span></div>",
"belief":"<div class=\"vis-code\"><span class=\"cm\">// Knowledge is factive</span>\n<span class=\"ck\">Knows</span>(Okafor, SurgeryAt9am)\n  ⟹ SurgeryAt9am is <span class=\"cv\">TRUE</span>\n\n<span class=\"cm\">// Belief is NOT factive</span>\n<span class=\"ck\">Believes</span>(Okafor, SurgeryAt9am)\n  ⇏ SurgeryAt9am is true\n\n<span class=\"cm\">// Wrong allergy record example:</span>\nSystem <span class=\"ck\">believed</span> NoAllergy(Maria)\n<span class=\"ce\">NOT</span> <span class=\"ck\">knew</span> — it was false\n\n<span class=\"cm\">// Belief retracts. Knowledge never needs to.</span></div>",
"opacity":"<div class=\"vis-code\"><span class=\"cm\">// World fact</span>\nMariaSantos = PatientInOR3\n\n<span class=\"cm\">// Okafor (read her chart)</span>\n<span class=\"ck\">K</span>_Okafor [Allergic(<span class=\"cv\">Maria</span>, Penicillin)]\n\n<span class=\"cm\">// Mehta (checked the room)</span>\n<span class=\"ck\">K</span>_Mehta  [Allergic(<span class=\"co\">PatientInOR3</span>, Penicillin)]\n\n<span class=\"cm\">// NOT the same belief.</span>\n<span class=\"cm\">// Neither knows the labels match.</span>\n<span class=\"cm\">// Only an agent who Knows(PatientInOR3=Maria)</span>\n<span class=\"cm\">// can safely combine them.</span></div>",
"worlds":"<div class=\"vis-tree\"><div class=\"vnode vn-amber\" style=\"font-size:11px\">Mehta's accessible worlds</div><div class=\"vrow\" style=\"margin-top:8px\"><div class=\"vbranch\"><div class=\"vline\"></div><div class=\"vnode vn-teal\" style=\"font-size:9px\">World 1<br><small>New admission<br>no file · routine</small></div></div><div class=\"vbranch\"><div class=\"vline\"></div><div class=\"vnode vn-teal\" style=\"font-size:9px\">World 2<br><small>New admission<br>no file · complex</small></div></div><div class=\"vbranch\"><div class=\"vline\"></div><div class=\"vnode vn-teal\" style=\"font-size:9px\">World 3<br><small>Transfer patient<br>no file · unknown</small></div></div></div><div style=\"margin-top:10px;font-size:10px;color:rgba(255,255,255,.45);text-align:center\">In ALL worlds: PatientInOR3 has no allergy file ✓<br>In SOME worlds: PatientInOR3 ≠ MariaSantos<br>→ K_Mehta[NoAllergy(Maria)] is <span style=\"color:#F4A080\">FALSE</span></div></div>",
"modal":"<div class=\"vis-code\"><span class=\"cm\">// K operator — \"knows that\"</span>\n<span class=\"ck\">K</span>_Mehta  [NoAllergyFile(NewAdmission)]\n<span class=\"cv\">✓</span> Mehta knows the new admission has no file\n\n<span class=\"cm\">// Substitution blocked inside K</span>\n<span class=\"ck\">K</span>_Mehta  [NoAllergyFile(MariaSantos)]\n<span class=\"ce\">✗</span> Mehta may not know those names match\n\n<span class=\"cm\">// Nested K</span>\n<span class=\"ck\">K</span>_Okafor [<span class=\"ck\">K</span>_Mehta [AllergyFlagged(Maria)]]\n<span class=\"cv\">✓</span> Okafor knows Mehta confirmed the allergy</div>",
"reasoner":"<div class=\"vis-tree\"><div class=\"vnode vn-muted\" style=\"font-size:11px\">Full FOL \u2014 expressive but slow</div><div class=\"vline\"></div><div class=\"vnode vn-amber\" style=\"font-size:11px\">Specialised reasoners<br><small>trade expressiveness for speed</small></div><div class=\"vrow\" style=\"margin-top:8px\"><div class=\"vbranch\"><div class=\"vline\"></div><div class=\"vnode vn-blue\" style=\"font-size:10px\">Semantic Networks<br><small>visual, intuitive</small></div></div><div class=\"vbranch\"><div class=\"vline\"></div><div class=\"vnode vn-teal\" style=\"font-size:10px\">Description Logics<br><small>formal, polynomial</small></div></div></div></div>",

  /*
