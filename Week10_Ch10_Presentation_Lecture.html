  "classification":"<div class=\"vis-code\"><span class=\"cm\">// Worked classification example</span>\n<span class=\"cm\">// TBox: InPatient \u2261 Patient \u2227 \u2203hasRoom.Room</span>\n<span class=\"cm\">// ABox facts</span>\n<span class=\"ck\">Patient</span>(Maria)\n<span class=\"ck\">hasRoom</span>(Maria, Room14)\n\n<span class=\"cm\">// Step 1 \u2013 identify Maria's category</span>\n<span class=\"ck\">Patient</span>(Maria)\n\n<span class=\"cm\">// Step 2 \u2013 check existential role filler</span>\n<span class=\"ck\">hasRoom</span>(Maria, Room14)\n\n<span class=\"cm\">// Step 3 \u2013 apply the definition</span>\n<span class=\"ck\">Patient</span>(x) \u2227 \u2203<span class=\"ck\">hasRoom</span>.<span class=\"ck\">Room</span> \u2192 <span class=\"cv\">InPatient</span>(x)\n\n<span class=\"cm\">// Conclusion</span>\n<span class=\"cv\">\u22a2 InPatient</span>(Maria)</div>",
  "complexity":"<div class=\"vis-code\"><span class=\"cm\">// Complexity of category reasoning</span>\n<span class=\"ck\">DL-Classifier</span>: O(n^k) time (polynomial)\n\n<span class=\"cm\">// Full FOL inference</span>: semi-decidable; may not halt\n\n<span class=\"cm\">// Trade-off</span>: restrict expressiveness for efficiency</div>",
  "inertiaTimeline":"<div class=\"vis-code\"><span class=\"cm\">// Inertia assumption timeline</span>\n<span class=\"cv\">Happens</span>(AppendectomyE1, 9am, 11am)\n<span class=\"cv\">Terminates</span>(Available(OR3), 9am)\n<span class=\"cv\">Initiates</span>(Available(OR3), 11am)\n\n<span class=\"ck\">Available</span>(OR3): true \u2192 false (9am) \u2192 true (11am)</div>",
  "kripke":"<div class=\"vis-kripke\"><svg width=\"100%\" viewBox=\"0 0 300 100\"><circle cx=\"70\" cy=\"50\" r=\"18\" fill=\"#4A6FA5\"/><text x=\"70\" y=\"54\" text-anchor=\"middle\" fill=\"white\" font-size=\"8\">w0</text><circle cx=\"170\" cy=\"20\" r=\"15\" fill=\"#7EC8F4\"/><text x=\"170\" y=\"24\" text-anchor=\"middle\" fill=\"#0F253F\" font-size=\"7\">w1</text><circle cx=\"170\" cy=\"80\" r=\"15\" fill=\"#7EC8F4\"/><text x=\"170\" y=\"84\" text-anchor=\"middle\" fill=\"#0F253F\" font-size=\"7\">w2</text><line x1=\"70\" y1=\"50\" x2=\"170\" y2=\"20\" stroke=\"#9FCC9F\" stroke-width=\"1.2\"/><line x1=\"70\" y1=\"50\" x2=\"170\" y2=\"80\" stroke=\"#9FCC9F\" stroke-width=\"1.2\"/></svg><div style=\"margin-top:8px;font-size:9px;color:rgba(255,255,255,.7)\">Believes_A(P) holds in w0 if P is true in every accessible world</div></div>",
  "circExample":"<div class=\"vis-code\"><span class=\"cm\">// Circumscription example</span>\n<span class=\"ck\">Patient</span>(x) \u2227 \u00ac<span class=\"cv\">Abnormal</span>(x) \u2192 <span class=\"cv\">SafeAntibiotic</span>(x)\n\n<span class=\"cm\">// Facts</span>\n<span class=\"ck\">Patient</span>(Maria)\n\u00ac<span class=\"cv\">Abnormal</span>(Maria)\n\n<span class=\"cm\">// Minimize abnormal set</span>\nIf no evidence marks x as Abnormal, infer SafeAntibiotic(x)\nEvidence of Abnormal(Maria) blocks the default</div>",
  "tmsNetwork":"<div class=\"vis-tree\"><div class=\"vnode vn-green\" style=\"font-size:11px\">SafeAntibioticOK(Maria)</div><div class=\"vline\"></div><div class=\"vnode vn-blue\" style=\"font-size:10px\">Justification:<br>NoCriticalAllergy(Maria)</div><div class=\"vline\"></div><div class=\"vnode vn-red\" style=\"font-size:10px\">AllergicTo(Maria, Penicillin)</div></div>",
  "nixon":"<div class=\"vis-tree\"><div class=\"vnode vn-blue\" style=\"font-size:11px\">Nixon<br><small>Quaker \u2227 Republican</small></div><div class=\"vrow\"><div class=\"vbranch\"><div class=\"vline\"></div><div class=\"vnode vn-green\" style=\"font-size:10px\">Quaker \u2192 Pacifist</div></div><div class=\"vbranch\"><div class=\"vline\"></div><div class=\"vnode vn-red\" style=\"font-size:10px\">Republican \u2192 \u00acPacifist</div></div></div><div style=\"margin-top:8px;text-align:center\"><span class=\"vtag vtag-red\">Conflict: cannot derive both</span></div></div>",

  "birdDefault":"<div class=\"vis-code\"><span class=\"cm\">// Default reasoning with birds and penguins</span>\n<span class=\"cm\">// Default rule: birds normally fly</span>\n<span class=\"ck\">Bird</span>(x) : <span class=\"cv\">Fly</span>(x)\n\n<span class=\"cm\">// Exception rule: penguins do not fly</span>\n<span class=\"ck\">Penguin</span>(x) : \u00ac<span class=\"cv\">Fly</span>(x)\n\n<span class=\"cm\">// Facts</span>\n<span class=\"ck\">Bird</span>(Tweety)\n<span class=\"ck\">Penguin</span>(Tweety)\n\n<span class=\"cm\">// Step 1 \u2013 from the default, we would infer Fly(Tweety)</span>\n<span class=\"cv\">Fly</span>(Tweety)\n\n<span class=\"cm\">// Step 2 \u2013 the exception blocks the default because Tweety is a penguin</span>\n\u00ac<span class=\"cv\">Fly</span>(Tweety)\n\n<span class=\"cm\">// Conclusion \u2013 non‑monotonic reasoning retracts Fly(Tweety)</span>\n<span class=\"cv\">\u22a2 \u00acFly</span>(Tweety)</div>",

  "tmsProof":"<div class=\"vis-code\"><span class=\"cm\">// Proof of default retraction with truth maintenance</span>\n<span class=\"cm\">// Default: if no critical allergy, assume StandardAntibioticOK(x)</span>\n<span class=\"ck\">Patient</span>(x) \u2227 \u00ac<span class=\"ck\">CriticalAllergy</span>(x) : <span class=\"cv\">StandardAntibioticOK</span>(x)\n\n<span class=\"cm\">// Initial facts</span>\n<span class=\"ck\">Patient</span>(Maria)\n<span class=\"cv\">NoCriticalAllergy</span>(Maria)\n\n<span class=\"cm\">// Step 1 \u2013 default fires</span>\n<span class=\"cv\">StandardAntibioticOK</span>(Maria)\n\n<span class=\"cm\">// Step 2 \u2013 new evidence arrives</span>\n<span class=\"ce\">AllergicTo</span>(Maria, Penicillin) \u2192 <span class=\"ck\">CriticalAllergy</span>(Maria)\n\n<span class=\"cm\">// Step 3 \u2013 justification removed \u2192 retraction</span>\n<span class=\"cv\">StandardAntibioticOK</span>(Maria) <span class=\"cm\">// retracted</span></div>",
"network":"<div class=\"vis-tree\"><div class=\"vnode vn-green\" style=\"font-size:11px\">Dr. Okafor</div><div class=\"vtag vtag-muted\" style=\"margin:3px auto;display:table;font-size:10px\">MemberOf</div><div class=\"vnode vn-blue\" style=\"font-size:11px\">Surgeons</div><div class=\"vtag vtag-muted\" style=\"margin:3px auto;display:table;font-size:10px\">SubsetOf</div><div class=\"vnode vn-blue\" style=\"font-size:11px\">Doctors</div><div class=\"vtag vtag-muted\" style=\"margin:3px auto;display:table;font-size:10px\">SubsetOf</div><div class=\"vnode vn-purple\" style=\"font-size:11px\">HospitalPersonnel<br><small>\ud83e\udeaa ID \u00b7 \ud83d\udd12 Protocols</small></div></div>",
"hierarchy":"<div class=\"vis-tree\"><div class=\"vnode vn-purple\" style=\"font-size:11px\">HospitalPersonnel</div><div class=\"vrow\" style=\"margin-top:6px\"><div class=\"vbranch\"><div class=\"vline\" style=\"height:14px\"></div><div class=\"vnode vn-blue\" style=\"font-size:10px\">MedicalStaff</div><div class=\"vrow\" style=\"margin-top:4px\"><div class=\"vbranch\"><div class=\"vline\" style=\"height:10px\"></div><div class=\"vnode vn-teal\" style=\"font-size:9px\">Doctors</div></div><div class=\"vbranch\"><div class=\"vline\" style=\"height:10px\"></div><div class=\"vnode vn-teal\" style=\"font-size:9px\">Nurses</div></div></div></div><div class=\"vbranch\"><div class=\"vline\" style=\"height:14px\"></div><div class=\"vnode vn-amber\" style=\"font-size:10px\">AdminStaff</div></div></div></div>",
"dl":"<div class=\"vis-code\"><span class=\"cm\">// Description Logic</span>\n<span class=\"cv\">InPatient</span> \u2261 <span class=\"ck\">Patient</span> \u2293 \u2203<span class=\"ck\">hasRoom</span>.<span class=\"ck\">Room</span>\n\n<span class=\"cm\">// Read: InPatient = Patient AND</span>\n<span class=\"cm\">// has at least one Room</span>\n\n<span class=\"cm\">// Reasoner checks:</span>\n<span class=\"cm\">// Is InPatient \u2286 Patient? \u2192 Yes \u2713</span>\n<span class=\"cm\">// Is Maria an InPatient? \u2192 Check ABox</span></div>",
"tbox":"<div class=\"vis-code\"><span class=\"cm\">// TBox \u2014 rule book (written once)</span>\n<span class=\"cv\">InPatient</span> \u2261 <span class=\"ck\">Patient</span> \u2293 \u2203hasRoom.Room\n\n<span class=\"cm\">// ABox \u2014 records (filled in per person)</span>\n<span class=\"ck\">Patient</span>(Maria)\n<span class=\"ck\">hasRoom</span>(Maria, Room14)\n\n<span class=\"cm\">// Auto-derived \u2713</span>\n<span class=\"cv\">\u22a2 InPatient</span>(Maria)\n<span class=\"cm\">// daily rounds triggered</span></div>",
"subsumption":"<div class=\"vis-tree\"><div class=\"vnode vn-teal\" style=\"font-size:11px\">InPatient<br><small>Patient \u2293 \u2203hasRoom</small></div><div class=\"vtag vtag-muted\" style=\"margin:5px auto;display:table;font-size:10px\">subsumed by (\u2286)</div><div class=\"vnode vn-blue\" style=\"font-size:11px\">Patient</div><div style=\"margin-top:10px;font-size:10px;color:rgba(255,255,255,.35);text-align:center\">Guaranteed by definition alone.<br>Verified in polynomial time.</div></div>",
"defaults":"<div class=\"vis-tree\"><div class=\"vnode vn-blue\" style=\"font-size:11px\">Normal assumption<br><small>No critical allergy recorded</small></div><div class=\"vline\"></div><div class=\"vtag vtag-amber\" style=\"margin:0 auto;display:table\">unless exception</div><div class=\"vline\"></div><div class=\"vnode vn-green\" style=\"font-size:11px\">Conclusion: StandardAntibioticOK(Maria)</div><div class=\"vline\"></div><div class=\"vnode vn-red\" style=\"font-size:11px\">Exception: AllergicTo(Maria, Penicillin)</div><div class=\"vline\"></div><div class=\"vtag vtag-red\" style=\"margin:0 auto;display:table\">conclusion retracted \u2717</div></div>",
"nonmono":"<div class=\"vis-code\"><span class=\"cm\">// Classical logic (monotonic)</span>\n<span class=\"ce\">Cannot retract</span> conclusions\n\n<span class=\"cm\">// Default reasoning (non-monotonic)</span>\n<span class=\"cv\">Can retract</span> when new facts arrive\n\n<span class=\"cm\">// Northgate:</span>\n\u22a2 NoKnownAllergy(Maria)  <span class=\"cm\">\u2190 default</span>\n\n<span class=\"ck\">AllergicTo</span>(Maria, Penicillin) added\n\n<span class=\"cv\">\u22a2 NoKnownAllergy(Maria) RETRACTED</span></div>",
"defaultlogic":"<div class=\"vis-code\"><span class=\"cm\">// Reiter's notation: P : J / C</span>\n\n<span class=\"ck\">Patient</span>(x) : <span class=\"cv\">\u00acCriticalAllergy</span>(x)\n             / <span class=\"cv\">\u00acCriticalAllergy</span>(x)\n\n<span class=\"cm\">// New fact arrives:</span>\n<span class=\"ce\">AllergicTo</span>(Maria, Penicillin)\n\n<span class=\"cm\">// Consistency check FAILS</span>\n<span class=\"ce\">// \u2192 default blocked \u2717</span></div>",
"circ":"<div class=\"vis-code\"><span class=\"cm\">// Circumscription</span>\n<span class=\"cm\">// Minimise Abnormal(x)</span>\n\n<span class=\"ck\">Patient</span>(x) \u2227 \u00ac<span class=\"ce\">Abnormal</span>(x)\n  \u2192 <span class=\"cv\">\u00acCriticalAllergy</span>(x)\n\n<span class=\"cm\">// When allergy found:</span>\n<span class=\"ce\">Abnormal</span>(Maria) \u2190 set true\n\n<span class=\"cm\">// Default no longer applies.</span>\n<span class=\"cm\">// CWA \u2260 Circumscription</span></div>",
"tms":"<div class=\"vis-tree\"><div class=\"vnode vn-green\" style=\"font-size:11px\">StandardAntibioticOK(Maria)</div><div class=\"vtag vtag-muted\" style=\"margin:4px auto;display:table;font-size:10px\">justified by</div><div class=\"vnode vn-blue\" style=\"font-size:11px\">\u00acAllergicTo(Maria, Penicillin)</div><div class=\"vline\"></div><div class=\"vnode vn-red\" style=\"font-size:11px\">AllergicTo(Maria, Penicillin) \u2190 added</div><div class=\"vline\"></div><div class=\"vtag vtag-red\" style=\"margin:0 auto;display:table\">Justification gone \u2192 Conclusion retracted \u2717</div></div>",
"practice":"<div class=\"vis-tree\"><div class=\"vnode vn-amber\" style=\"font-size:11px\">New case: pneumonia patient</div><div style=\"display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:10px\"><span class=\"vtag vtag-blue\">Ontology C,R,P</span><span class=\"vtag vtag-blue\">Member + Subset</span><span class=\"vtag vtag-teal\">Happens CT scan</span><span class=\"vtag vtag-teal\">Initiates / Terminates</span><span class=\"vtag vtag-amber\">Default rule</span><span class=\"vtag vtag-red\">Exception that retracts it</span></div></div>",
"warning":"<div class=\"vnode vn-red\" style=\"padding:20px;text-align:center\"><div style=\"font-size:28px;margin-bottom:10px\">\u26a0\ufe0f</div><strong style=\"font-size:13px;color:#F4A080\">Common Mistake Alert</strong><br><br><span style=\"font-size:11px;color:#C8DCF0;line-height:1.6\">Translate every formula<br>back into plain English<br>before answering.</span></div>"};
const slides=[{"section":"Opening","title":"Chapter 10: Knowledge Representation","subtitle":"Teaching a computer what the hospital world looks like","bullets":["Knowledge representation is how an AI stores facts so it can reason with them.","Northgate General Hospital will be our single running example.","Click anywhere to reveal explanation snippets before moving on."],"reveals":["In this chapter, the main question is not “Can the AI calculate?” but “What does the AI know, and how is that knowledge organized?”","Novice shortcut: think of a knowledge base as a library. Representation is the catalog system that makes the library usable.","Hospital anchor: Maria, Dr. Okafor, Nurse Priya, OR-3, appendectomy, medications, allergies, schedules, and reports."],"kind":"hospital"},{"section":"Opening","title":"Learning Goals","subtitle":"What students should be able to do by the end","bullets":["Explain ontology, category, object, event, belief, semantic network, description logic, and default reasoning.","Write small hospital examples using Member, Subset, PartOf, Happens, Initiates, and Terminates.","Explain why an AI sometimes must retract earlier conclusions."],"reveals":["Goal 1 is vocabulary. Students need plain-English meanings before formal notation.","Goal 2 is transfer. They should apply the same idea to a new hospital fact, not just repeat a definition.","Goal 3 is safety. Hospital AI must update conclusions when new facts arrive, such as allergy information."],"kind":"map"},{"section":"Opening","title":"Northgate General Hospital","subtitle":"The running story for every slide","bullets":["Maria Santos is a 34-year-old patient.","Dr. James Okafor is the surgeon.","Nurse Priya Mehta assists care.","OR-3 is the operating room.","Appendectomy occurs March 14, 9am to 11am."],"reveals":["We use one story so students can focus on the AI concept instead of learning a new example every slide.","The same facts will be represented in different ways: as categories, events, beliefs, networks, and defaults.","This mirrors real hospital systems: patient records, scheduling, clinical rules, and safety alerts must work together."],"kind":"hospital"},{"section":"Opening","title":"Why Representation Matters","subtitle":"Facts are not useful until the AI can use them","bullets":["Raw fact: “Maria has appendicitis.”","Structured fact: DiagnosedWith(Maria, Appendicitis).","Reasoned conclusion: Maria needs a procedure, room, staff, and schedule."],"reveals":["A sentence in English is understandable to humans, but an AI needs structure to connect it with other facts.","Once structured, the AI can answer questions it was never directly programmed to answer.","Hospital example: if Dr. Okafor is a surgeon and surgeons are doctors, the system can infer he has doctor permissions."],"kind":"reasoning"},{"section":"Opening","title":"Chapter 10 as Six Layers","subtitle":"A staircase from vocabulary to flexible reasoning","bullets":["10.1 Ontological engineering","10.2 Categories and objects","10.3 Events and time","10.4 Mental objects and modal logic","10.5 Reasoning systems for categories","10.6 Reasoning with default information"],"reveals":["Layer 1 asks: What kinds of things exist?","Layer 2 asks: How do individuals fit into groups?","Layer 3 asks: How do facts change over time?","Layer 4 asks: What do agents know or believe?","Layer 5 asks: How can category reasoning be efficient?","Layer 6 asks: How do we reason when normal assumptions later change?"],"kind":"stack"},{"section":"Opening","title":"Notation Survival Kit","subtitle":"Read the logic like short hospital sentences","bullets":["Member(Maria, Patients): Maria is in the Patients category.","Subset(Surgeons, Doctors): every surgeon is a doctor.","PartOf(Blade, Scalpel7): the blade is a component of Scalpel7.","Happens(SurgeryE1, 9am, 11am): an event occurred during an interval."],"reveals":["Do not let symbols scare you. Each formula is just a compressed sentence.","Member connects one individual to one category. Subset connects one category to a larger category.","The opening section established the hospital scenario and defined why knowledge representation matters. Section 10.1 now asks: what is the right structure for organising all of this hospital knowledge? The answer begins with the ontology — a formal map of everything the AI is allowed to know about."],"kind":"notation"},{"section":"10.1 Ontological Engineering","title":"What Is an Ontology?","subtitle":"A formal map of what exists and how it connects","bullets":["An ontology defines the important kinds of things in a domain.","It names relationships among those things.","It gives the AI a shared vocabulary for reasoning."],"reveals":["Every hospital uses words like patient, doctor, room, procedure, medication, and allergy.","The ontology says which of those are categories, which are relationships, and which are properties.","Without an ontology, the AI has a pile of facts instead of a usable knowledge system."],"kind":"ontology"},{"section":"10.1 Ontological Engineering","title":"The Ontology Triple: O = (C, R, P)","subtitle":"Concepts, relations, and properties","bullets":["C = Concepts: Patient, Doctor, Room, Medication.","R = Relations: TreatedBy, AssignedTo, PerformedIn.","P = Properties: age, blood type, capacity, availability."],"reveals":["Concepts are category types. They answer “What kind of thing is this?”","Relations connect two or more things. They answer “How are these things linked?”","Properties describe attributes of individuals. They answer “What value does this thing have?”"],"kind":"triple"},{"section":"10.1 Ontological Engineering","title":"Concepts at Northgate","subtitle":"The main categories in the hospital world","bullets":["Patient","Doctor","Nurse","OperatingRoom","Medication","Procedure","Condition"],"reveals":["Maria is not a concept; she is an individual instance of Patient.","Appendicitis can be represented as a Condition concept, with Maria linked to it by DiagnosedWith.","Concepts let the AI apply one rule to many individuals."],"kind":"category"},{"section":"10.1 Ontological Engineering","title":"Relations at Northgate","subtitle":"Named links between things","bullets":["TreatedBy(Maria, DrOkafor)","AssignedTo(Maria, Room14)","PerformedIn(AppendectomyE1, OR3)","AdministeredBy(MorphineDose1, NursePriya)"],"reveals":["A relation is like a labeled line between boxes in a diagram.","Relations make queries possible: “Who treats Maria?” or “Where did the procedure occur?”","Good relation names prevent ambiguity. TreatedBy is not the same as AssignedTo."],"kind":"relations"},{"section":"10.1 Ontological Engineering","title":"Properties at Northgate","subtitle":"Attributes of individual things","bullets":["Age(Maria) = 34","BloodType(Maria) = O+","Capacity(OR3) = 1","IsAvailable(OR3) = false during surgery"],"reveals":["Properties usually attach a value to an individual.","A category such as Patients does not have one blood type. Individual patients do.","Some properties are stable; others change over time and become fluents later in the chapter."],"kind":"properties"},{"section":"10.1 Ontological Engineering","title":"Upper Ontology","subtitle":"The master filing system","bullets":["Everything can be organized under very general branches.","Examples: Abstract Objects, Events, Things, Agents, Stuff.","Hospital-specific concepts hang below these general ideas."],"reveals":["Doctor is a kind of Agent because doctors can act.","AppendectomyE1 is an Event because it happens over time.","Morphine is Stuff because portions of morphine are still morphine."],"kind":"upper"},{"section":"10.1 Ontological Engineering","title":"Upper vs. Domain Ontology","subtitle":"General skeleton vs. hospital-specific vocabulary","bullets":["Upper ontology: Object, Event, Agent, Time.","Hospital domain ontology: Patient, Surgeon, OR, Medication, Allergy.","Both are needed for reusable AI knowledge."],"reveals":["Upper ontology helps different systems share a basic structure.","Domain ontology adds the specialized detail needed for medicine.","Appendicitis belongs in the medical domain ontology, not the top-level upper ontology."],"kind":"upper"},{"section":"10.1 Ontological Engineering","title":"Build the Northgate Triple","subtitle":"A first complete representation","bullets":["C = {Patient, Doctor, Nurse, OperatingRoom, Procedure, Condition}.","R = {TreatedBy, DiagnosedWith, PerformedIn, AssignedTo}.","P = {Age, BloodType, Specialty, Capacity, Availability}."],"reveals":["The ontology separates structure from facts.","Define TreatedBy once, then use it for every patient-doctor pair.","The concepts from this section are the foundation for what follows. Each new tool in Chapter 10 extends the hospital AI's ability to represent a more complete and accurate picture of Northgate General — one that a clinical reasoning system could actually use."],"kind":"triple"},{"section":"10.2 Categories and Objects","title":"Categories vs. Individual Objects","subtitle":"Group type is not the same as a specific thing","bullets":["Patient is a category.","Maria is an individual object.","OperatingRoom is a category.","OR-3 is an individual room."],"reveals":["A category like Patients acts as a template: it defines what properties any patient has, but it does not have those properties itself. Every individual member — Maria, David, Aisha — has a blood type, a room, a surgeon. The category Patients has none of those. Students who blur this line write nonsense like BloodType(Patients) = 'O+', which has no meaning in FOL.","An individual is one specific item in the world.","Do not say the Patients category has Maria’s blood type. Maria has the blood type."],"kind":"category"},{"section":"10.2 Categories and Objects","title":"Member vs. Subset","subtitle":"Two forms of belonging","bullets":["Member(Maria, Patients): individual to category.","Subset(Surgeons, Doctors): category to larger category.","They are not interchangeable."],"reveals":["Member answers: “Is this specific object in this group?”","Subset answers: “Is every member of this smaller group also in the bigger group?”","Wrong example: Subset(Maria, Patients) treats Maria like a category."],"kind":"member"},{"section":"10.2 Categories and Objects","title":"Inheritance","subtitle":"Properties flow down category chains","bullets":["Subset(Surgeons, Doctors).","Subset(Doctors, MedicalStaff).","MedicalStaff follow infection-control protocols.","Therefore surgeons follow them too."],"reveals":["Inheritance prevents repetitive data entry.","A rule written for MedicalStaff automatically applies to doctors, surgeons, and nurses if they are subcategories.","Hospital benefit: fewer missing rules and more consistent safety checks."],"kind":"inheritance"},{"section":"10.2 Categories and Objects","title":"Northgate Inference Chain","subtitle":"How the AI derives a new fact","bullets":["Member(DrOkafor, Surgeons).","Subset(Surgeons, Doctors).","For all doctors: HasPrescriptionRights(x).","Conclusion: HasPrescriptionRights(DrOkafor)."],"reveals":["The conclusion was not typed directly into the system.","It follows from category membership plus a general rule.","This is the power of representing knowledge at the category level."],"kind":"reasoning"},{"section":"10.2 Categories and Objects","title":"Partitions","subtitle":"Cleanly slicing a parent category","bullets":["Disjoint: no overlap among child categories.","Exhaustive: every parent member is covered.","Partition: disjoint and exhaustive together."],"reveals":["Example: Patients, MedicalStaff, and AdminStaff might partition HospitalPersonnel.","If the partition is valid, Dr. Okafor being MedicalStaff means he is not a Patient.","Partitions help the AI detect contradictions and missing classifications."],"kind":"partition"},{"section":"10.2 Categories and Objects","title":"Disjoint Is Not Enough","subtitle":"No overlap, but maybe missing people","bullets":["Doctors and Nurses can be disjoint.","That does not cover AdminStaff.","The parent category may still have unclassified members."],"reveals":["Disjoint means no one can be in two selected categories at the same time.","It does not guarantee every person is assigned somewhere.","For hospital records, missing groups can create reporting gaps."],"kind":"partition"},{"section":"10.2 Categories and Objects","title":"Exhaustive Is Not Enough","subtitle":"Everyone covered, but overlap may remain","bullets":["MedicalStaff and AdminStaff may cover all workers.","But a nurse manager might fit both.","That is exhaustive but not disjoint."],"reveals":["Exhaustive means every member appears in at least one child category.","Double membership is the problem exhaustive decomposition leaves unsolved. A nurse manager at Northgate fits MedicalStaff (she manages clinical staff) AND AdminStaff (she handles rosters and budgets). An exhaustive decomposition accepts this. A partition does not — it requires exactly one group per person. If the billing system needs to route every staff member to exactly one cost centre, exhaustive decomposition will cause errors for dual-role staff.","If the hospital needs exactly one billing category, it needs a partition, not just exhaustive coverage."],"kind":"partition"},{"section":"10.2 Categories and Objects","title":"Things vs. Stuff","subtitle":"The cut-it-in-half test","bullets":["Scalpel: a Thing. Cut it in half and it is not two scalpels.","Morphine: Stuff. Divide it and each portion is still morphine.","Things are counted; stuff is measured."],"reveals":["Things usually use count words: one scalpel, three syringes.","Stuff usually uses units: 50 ml morphine, 200 ml saline.","This matters for inventory and dosage reasoning."],"kind":"stuff"},{"section":"10.2 Categories and Objects","title":"PartOf","subtitle":"Physical component, not category membership","bullets":["PartOf(Blade, Scalpel7).","PartOf(Scalpel7, SurgicalKit3).","Therefore PartOf(Blade, SurgicalKit3)."],"reveals":["PartOf is often transitive: part of a part can be part of the whole.","PartOf is not SubsetOf. A blade is not a smaller category inside scalpel.","Hospital example: a scalpel is part of a kit, but Surgeons are a subset of Doctors."],"kind":"partof"},{"section":"10.2 Categories and Objects","title":"Category Is Not a Composite Object","subtitle":"Avoid a common beginner mistake","bullets":["Patients is a category.","Maria is an individual patient.","The hospital patient list is a collection record.","These are three different things."],"reveals":["A category describes what counts as a patient.","A collection is a specific object with a definite membership list right now. The Northgate patient roster for 14 March is a collection — it has exactly the patients admitted that day. The category Patients is a timeless description — it says what any patient IS, not who is currently admitted. Confusing these leads to modelling errors: you cannot add Maria to a category, only assert that she is a member of it.","The distinction matters for queries. 'How many Patients are there?' is unanswerable from the category alone — you need the ABox (the facts about specific individuals). 'What properties do Patients have?' is answered by the TBox (the category definition). Categories live in the schema; individuals live in the data. This separation is the foundation of description logics in §10.5."],"kind":"warning"},{"section":"10.3 Events and Time","title":"Why Events Matter","subtitle":"The hospital world is a movie, not a photo","bullets":["OR-3 changes from available to occupied.","Maria changes from pre-op to in-surgery to recovery.","Nurse assignments change by shift."],"reveals":["Earlier sections describe what things are. Events describe what happens.","An AI scheduler cannot reason from a timeless snapshot.","It must know when a fact started, when it ended, and whether it still holds."],"kind":"event"},{"section":"10.3 Events and Time","title":"Fluents","subtitle":"Facts that can change over time","bullets":["Available(OR3)","OccupiedBy(OR3, Maria)","InRecovery(Maria)","OnCall(DrOkafor)"],"reveals":["A fluent is a property whose truth can vary over time.","Available(OR3) is true before surgery and false during surgery.","Fluents are central to event calculus because they are what events act on. An event does not describe a static fact — it describes a change. Happens(AppendectomyE1, 9am, 11am) says the surgery occurred. Terminates(AppendectomyE1, Available(OR3), 9am) says it switched the Available(OR3) fluent from true to false. Without fluents as the thing being changed, event calculus would have nothing to reason about. Every predicate that can have a different truth value at different times must be modelled as a fluent — never as a static fact."],"kind":"fluent"},{"section":"10.3 Events and Time","title":"Happens(event, start, end)","subtitle":"Representing an event interval","bullets":["Happens(AppendectomyE1, 9am, 11am).","The event is not just a label; it occupies time.","The AI can compare this interval with other bookings."],"reveals":["Happens says the event occurred over a time interval.","The event can later receive more facts: surgeon, patient, room, duration.","This avoids treating surgery as an instant moment."],"kind":"timeline"},{"section":"10.3 Events and Time","title":"Initiates","subtitle":"An event turns a fluent on","bullets":["Initiates(SurgeryStart, OccupiedBy(OR3, Maria), 9am).","Initiates(SurgeryEnd, InRecovery(Maria), 11am).","A single event can initiate several fluents."],"reveals":["Initiates means a property becomes true at a time.","At 9am, the room becomes occupied by Maria.","At 11am, Maria’s recovery status becomes true."],"kind":"event"},{"section":"10.3 Events and Time","title":"Terminates","subtitle":"An event turns a fluent off","bullets":["Terminates(SurgeryStart, Available(OR3), 9am).","Terminates(SurgeryEnd, InSurgery(Maria), 11am).","Termination prevents outdated facts from staying true."],"reveals":["Terminates means a property stops being true at a time.","Starting surgery both terminates Available(OR3) and initiates OccupiedBy(OR3, Maria).","One event can turn one fluent off while turning another on."],"kind":"event"},{"section":"10.3 Events and Time","title":"T(fluent, t1, t2)","subtitle":"A fluent holds continuously across an interval","bullets":["T(OccupiedBy(OR3, Maria), 9am, 11am).","T(InSurgery(Maria), 9am, 11am).","T(Available(OR3), 11:30am, 1pm) only if it was reinitiated."],"reveals":["T is useful for questions like “Was OR-3 occupied at 10am?”","It summarizes continuity, not just start and end points.","Schedulers use this idea to detect conflicts."],"kind":"timeline"},{"section":"10.3 Events and Time","title":"Inertia Assumption","subtitle":"Facts persist until changed","bullets":["If OR-3 becomes occupied at 9am, it stays occupied until an event changes it.","If Maria enters recovery at 11am, she remains in recovery until discharged or transferred.","The AI does not need a new fact for every minute."],"reveals":["Inertia is common-sense persistence: once something becomes true, it stays true until something actively makes it false. After Maria enters OR-3 at 9am, the AI does not need a separate fact for every minute saying she is still there. The fluent OccupiedBy(OR3, Maria) persists automatically from 9am until Terminates fires at 11am. Without inertia, every second of surgery would require a separate assertion — an impossible burden. The inertia assumption is what makes event calculus practical for real-world reasoning.","It prevents the system from forgetting facts immediately after they are asserted.","But it also means we must explicitly add events that change important states."],"kind":"fluent"},{"section":"10.3 Events and Time","title":"Can OR-3 Be Booked at 10am?","subtitle":"A conflict-detection example","bullets":["AppendectomyE1 happens 9am-11am.","OR-3 is occupied during that interval.","A proposed 10am surgery overlaps.","Conclusion: reject the booking."],"reveals":["The AI uses time intervals, not human intuition.","The proposed event overlaps the existing event and needs the same room.","Event calculus turns scheduling into formal reasoning."],"kind":"conflict"},{"section":"10.3 Events and Time","title":"Allen Interval Relations","subtitle":"Eight ways two events can relate","bullets":["Before","After","Meets","Overlaps","During","Starts","Finishes","Equals"],"reveals":["Every pair of time intervals fits one of these relationships.","Hospital example: ward round meets surgery if one ends exactly when the other begins.","Anesthesia may overlap surgery because it starts earlier and ends later."],"kind":"allen"},{"section":"10.3 Events and Time","title":"Reification","subtitle":"Turning an event into an object","bullets":["AppendectomyE1 becomes a thing the AI can describe.","Patient(AppendectomyE1, Maria).","Surgeon(AppendectomyE1, DrOkafor).","Room(AppendectomyE1, OR3)."],"reveals":["Reification lets us attach details to an event.","Instead of writing one huge relation with many arguments, we create an event object and link facts to it.","The concepts from this section are the foundation for what follows. Each new tool in Chapter 10 extends the hospital AI's ability to represent a more complete and accurate picture of Northgate General — one that a clinical reasoning system could actually use."],"kind":"reify"},{"section":"10.4 Mental Objects and Modal Logic","title":"FOL Breaks When You Add Beliefs","subtitle":"The bug that makes a new kind of logic necessary","kind":"mental","bullets":["FOL works perfectly for facts about the world.","It breaks the moment you write what someone believes.","The reason is a rule called referential transparency."],"reveals":["FOL has a substitution rule baked in: if two expressions refer to the same object, you can always swap one for the other. This is called referential transparency. For facts it is harmless and useful.","Hospital example of transparency working fine: Maria's room = Room 4B. So 'Room 4B needs sanitising' and 'Maria's room needs sanitising' are interchangeable. That is correct and safe.","Now try it with a belief. Nurse Mehta knows the new admission has no allergies on file. The new admission = Maria Santos. FOL concludes: Nurse Mehta knows Maria Santos has no allergies. But Mehta has never heard the name Maria Santos — she only knows a patient arrived and had no file. FOL just put knowledge in her head that she does not have. That is the bug."]},{"section":"10.4 Mental Objects and Modal Logic","title":"The Fix: The K Operator","subtitle":"One wrapper that blocks automatic substitution inside beliefs","kind":"modal","bullets":["Modal logic adds a 'knows that' wrapper: K","K_Mehta [the new admission has no allergies]","The rule: you cannot swap names inside the wrapper."],"reveals":["Read K_Mehta [P] as: 'Mehta knows that P.' The subscript is who knows. Everything inside the brackets is what they know — treated as a sentence being believed, not an object being referenced.","Inside K, substitution is switched off. Mehta's belief is frozen to the exact description she used. 'New admission' and 'Maria Santos' refer to the same person in the world — but inside K_Mehta, they are different mental objects. You cannot swap them unless you can prove Mehta knows they are identical.","Why this matters clinically: Mehta may act correctly on what she knows about the new admission. An AI that substitutes 'Maria Santos' into her belief and concludes she knows Maria's full allergy history will make decisions based on knowledge Mehta does not actually have — a patient safety failure."]},{"section":"10.4 Mental Objects and Modal Logic","title":"K in Practice — Two Staff, Two Beliefs","subtitle":"The same world fact, two different mental representations","kind":"opacity","bullets":["World fact: Maria Santos = the patient in OR-3","K_Okafor [Allergic(Maria, Penicillin)]  — he read her chart","K_Mehta  [Allergic(PatientInOR3, Penicillin)]  — she checked the room"],"reveals":["Without K, FOL collapses these into the same thing: Maria = PatientInOR3, so both agents know the same fact about the same person. This appears correct but erases a critical distinction.","With K, these are two different beliefs. Okafor's belief is anchored to the name 'Maria Santos.' Mehta's belief is anchored to 'the patient in OR-3.' Neither agent necessarily knows those two descriptions refer to the same person.","Only an agent who knows K_Nurse2 [PatientInOR3 = Maria] can safely combine those two beliefs. An AI using K can track exactly who has connected which labels — and block actions that depend on a connection that has not yet been established for that agent. This is referential opacity: the label used inside a belief context is not freely swappable, even when the labels refer to the same object.","EHR safety consequence: if the pharmacy module stores Mehta's allergy flag under 'PatientInOR3' and the prescription module queries under 'Maria Santos', the connection is never made and the safety check fails — even though the allergy is in the system. K makes this failure visible and preventable."]},{"section":"10.4 Mental Objects and Modal Logic","title":"Knowledge vs. Belief — The Factive Rule","subtitle":"You cannot know something false. You can believe it.","kind":"belief","bullets":["Knows(Agent, P) implies P is true in the actual world.","Believes(Agent, P) makes no such guarantee.","A justified false belief is still not knowledge."],"reveals":["This is the factive property of knowledge. If Dr. Okafor knows the surgery is at 9am, then it is at 9am — full stop. If the time was changed and Okafor was not informed, he does not know the new time. He has a false belief about the old time.","If the allergy record is wrong — mislabelled, data entry error, wrong patient — then the system believed Maria had no allergies. It did not know it. The moment the record is corrected, the belief must be retracted. Knowledge would never have needed retracting because it could not have been false in the first place.","Hospital safety systems should track evidence and its source, not just conclusions. 'We know X' and 'We believe X based on one preliminary report' are different states with different appropriate actions. Modal logic gives the AI the vocabulary to maintain that distinction."]},{"section":"10.4 Mental Objects and Modal Logic","title":"Possible Worlds — What Makes K Rigorous","subtitle":"K is true when P holds in every world the agent considers possible","kind":"worlds","bullets":["Imagine all scenarios Mehta considers consistent with what she knows.","K_Mehta [P] is true if P holds in every one of those scenarios.","Substitution fails when the substituted version is not true in all her scenarios."],"reveals":["Mehta's accessible worlds after checking the room might include: World 1 — new admission, routine case, no file. World 2 — new admission, complex case, no file. World 3 — transfer patient, no file, unknown history. In every world she holds open, the patient in OR-3 has no allergy on file. So K_Mehta [Allergic(PatientInOR3, Penicillin) = false] is true.","'Maria Santos has no allergies' is only true in some of those worlds — in others, Maria Santos is not even the patient in OR-3. So K_Mehta [NoAllergy(Maria)] is false. The possible-worlds framework explains exactly why the substitution is blocked: the substituted sentence is not true across all of Mehta's accessible worlds.","Knowledge removes worlds. Every new thing an agent learns rules out scenarios that would have contradicted it. Belief may rank worlds or select among them without guaranteeing the actual world is included. This is why knowledge implies truth and belief does not."]},{"section":"10.4 Mental Objects and Modal Logic","title":"Nested Beliefs — What One Agent Knows About Another","subtitle":"K operators can stack — and that is what multi-agent AI needs","kind":"modal","bullets":["K_Okafor [K_Mehta [Allergic(Maria, Penicillin)]]","Read as: Okafor knows that Mehta knows Maria is allergic.","This is impossible to express in plain FOL."],"reveals":["Nested K is not a curiosity — it is essential for coordination. If a pre-op handover protocol requires that the surgeon knows the nurse has confirmed the allergy flag, the system must represent K_Okafor [K_Mehta [AllergyFlagged(Maria)]] and verify it before clearing the patient.","You can also represent gaps in shared knowledge. If the pharmacy system has flagged an interaction but the surgeon has not been notified, the AI can represent: K_Pharmacy [DangerousInteraction(Maria, DrugA)] and NOT K_Okafor [DangerousInteraction(Maria, DrugA)]. The gap is explicit and actionable — trigger an alert.","Multi-agent AI in hospitals, autonomous vehicles, and robot teams all depend on this. Agents need to track not just what is true but what each member of the team knows — and what they know about each other's knowledge. Modal logic with nested K operators is the standard tool for that."]},{"section":"10.4 Mental Objects and Modal Logic","title":"The Omniscience Problem and the Safety Lesson","subtitle":"The one known flaw in K, and what it means for hospital AI","kind":"hospital","bullets":["Modal logic assumes: if you know P and P implies Q, you know Q.","Real agents miss implications — nurses, doctors, and AI systems all do.","Hospital AI must be explicit about which inferences are required."],"reveals":["This is called the logical omniscience problem. A real nurse may know two facts that together imply a dangerous drug interaction — and still miss it. Modal logic assumes she automatically knows the interaction the moment she knows both facts. That is clearly unrealistic, and there is no fully satisfying fix yet.","The practical consequence for hospital AI: do not rely on the AI automatically deriving safety-critical conclusions just because the facts logically imply them. Designers must explicitly encode which inferences are required for safe operation — not assume the system will notice everything that follows from what it knows.","The broader lesson of §10.4: a safety alert is partly a knowledge-transfer problem. The surgeon may not know the allergy update yet. The pharmacy may know it. The scheduling AI may believe OR-3 is available when it is not. Modal logic gives the AI a vocabulary for tracking who knows what, when, and from which source — and for detecting when a critical piece of knowledge has not reached the agent who needs to act on it."]},{"section":"10.5 Reasoning Systems for Categories","title":"Why Specialized Reasoners?","subtitle":"Full first-order logic can be too expensive","bullets":["Hospitals have thousands of categories and millions of facts.","The AI needs fast category reasoning.","Specialized systems trade some expressiveness for efficiency."],"reveals":["Chapter 10 introduces semantic networks and description logics.","Both focus on categories, membership, and inheritance.","This is practical because many everyday questions are category questions."],"kind":"reasoner"},{"section":"10.5 Reasoning Systems for Categories","title":"Semantic Networks","subtitle":"A graph of objects, categories, and links","bullets":["Nodes represent objects or categories.","Links represent relations like MemberOf, SubsetOf, PartOf, or TreatedBy.","Inheritance follows links through the graph."],"reveals":["Semantic networks are visually intuitive for beginners.","They make “follow the arrows” reasoning easy to see.","Hospital example: DrOkafor -> Surgeons -> Doctors -> MedicalStaff."],"kind":"network"},{"section":"10.5 Reasoning Systems for Categories","title":"Northgate Staff Hierarchy","subtitle":"A semantic network example","bullets":["MemberOf(DrOkafor, Surgeons).","SubsetOf(Surgeons, Doctors).","SubsetOf(Doctors, MedicalStaff).","SubsetOf(MedicalStaff, HospitalPersonnel)."],"reveals":["The network stores both individual facts and category structure.","To answer “Is Dr. Okafor hospital personnel?” the reasoner follows category links upward.","This is faster and clearer than rechecking every rule manually."],"kind":"hierarchy"},{"section":"10.5 Reasoning Systems for Categories","title":"Multiple Inheritance","subtitle":"One object or category can inherit from more than one parent","bullets":["A NursePractitioner may be both NursingStaff and PrescribingClinicians.","A ResidentSurgeon may be both Trainee and Surgeon.","Conflicts can arise if parents provide different defaults."],"reveals":["Multiple inheritance is powerful but risky.","If one parent says “can prescribe” and another says “requires supervision,” the system must combine or resolve them.","Default reasoning in Section 10.6 helps with exceptions."],"kind":"inheritance"},{"section":"10.5 Reasoning Systems for Categories","title":"Limits of Semantic Networks","subtitle":"Easy pictures can hide formal problems","bullets":["Links usually express binary relations.","Negation and disjunction are harder.","N-ary relations often require reification."],"reveals":["A flight-like event such as surgery with patient, surgeon, room, and time is more than binary.","Reifying SurgeryE1 solves this by creating an event object with separate links.","The more expressive the network becomes, the closer it gets to full logic and its complexity."],"kind":"warning"},{"section":"10.5 Reasoning Systems for Categories","title":"Description Logics","subtitle":"A formal language for category definitions","bullets":["Defines categories precisely.","Supports efficient classification.","Used in ontology languages and biomedical knowledge systems."],"reveals":["Description logic is less pictorial than semantic networks but more formally controlled.","It is designed for reasoning about classes and relationships.","It asks questions such as: Is every InPatient also a Patient?"],"kind":"dl"},{"section":"10.5 Reasoning Systems for Categories","title":"TBox and ABox","subtitle":"Rules plus records","bullets":["TBox: InPatient = Patient with an assigned room.","ABox: Patient(Maria); hasRoom(Maria, Room14).","Reasoner derives: InPatient(Maria)."],"reveals":["TBox is the terminology box: category definitions.","ABox is the assertion box: facts about individuals.","Together, they let the AI classify individual cases automatically."],"kind":"tbox"},{"section":"10.5 Reasoning Systems for Categories","title":"Subsumption and Classification","subtitle":"Checking category containment","bullets":["Subsumption: Is category A always inside category B?","Example: InPatient is subsumed by Patient.","Classification: place individuals into the right categories."],"reveals":["Subsumption checks definitions, not just current examples.","If InPatient is defined as Patient with a room, then every InPatient is a Patient by definition.","The concepts from this section are the foundation for what follows. Each new tool in Chapter 10 extends the hospital AI's ability to represent a more complete and accurate picture of Northgate General — one that a clinical reasoning system could actually use."],"kind":"subsumption"},{"section":"10.5 Reasoning Systems for Categories","title":"Worked Example: Classifying InPatient(Maria)","subtitle":"Step-by-step derivation with TBox and ABox","bullets":["TBox: InPatient = Patient with an assigned room.","ABox: Patient(Maria); hasRoom(Maria, Room14).","Goal: prove Member(Maria, InPatient)."],"reveals":["Step 1: Check the definition: InPatient(x) ↔ Patient(x) ∧ hasRoom(x,y).","Step 2: The ABox tells us Patient(Maria) and hasRoom(Maria, Room14).","Conclusion: Maria satisfies the definition, so the reasoner infers Member(Maria, InPatient)."],"kind":"classification"},{"section":"10.6 Reasoning with Default Information","title":"Why Defaults Are Needed","subtitle":"Real knowledge is often normal-but-not-always","bullets":["Most scheduled surgeries use the assigned OR.","Most patients have no critical allergy recorded.","Most staff follow standard access rules."],"reveals":["Defaults let the AI make useful assumptions without pretending they are guaranteed.","Hospitals need defaults because waiting for perfect information can delay action.","But defaults must be retractable when exceptions appear."],"kind":"defaults"},{"section":"10.6 Reasoning with Default Information","title":"Monotonic vs. Non-Monotonic","subtitle":"Can conclusions be withdrawn?","bullets":["Monotonic reasoning only adds conclusions.","Non-monotonic reasoning can retract conclusions.","Default reasoning is non-monotonic."],"reveals":["In classical logic, adding facts does not remove old conclusions.","In real hospitals, new facts can change what is reasonable to conclude.","Example: “no known allergy” is withdrawn when a penicillin allergy is recorded."],"kind":"nonmono"},{"section":"10.6 Reasoning with Default Information","title":"Default Logic","subtitle":"If consistent, conclude","bullets":["Default: if patient has no recorded allergy, assume standard antibiotic is allowed.","New fact: AllergicTo(Maria, Penicillin).","The default no longer applies."],"reveals":["A default rule fires only when it does not contradict known facts.","This prevents the system from concluding both “safe” and “unsafe” for the same drug.","Defaults are useful but must be carefully scoped."],"kind":"defaultlogic"},{"section":"10.6 Reasoning with Default Information","title":"Canonical Example: Birds and Penguins","subtitle":"Default vs exception reasoning","bullets":["Default: Birds normally fly.","Exception: Penguins are birds that do not fly.","Facts: Bird(Tweety); Penguin(Tweety)."],"reveals":["Step 1: From Bird(Tweety), the default rule suggests Fly(Tweety).","Step 2: Because Tweety is a penguin, the exception ¬Fly(Tweety) overrides the default.","Conclusion: Non‑monotonic reasoning retracts Fly(Tweety) and concludes ¬Fly(Tweety)."],"kind":"birdDefault"},{"section":"10.6 Reasoning with Default Information","title":"Circumscription","subtitle":"Assume abnormalities are minimal","bullets":["Represent unusual cases with Abnormal(x).","Assume patients are normal unless evidence marks an abnormal case.","Maria becomes abnormal for penicillin if allergy is recorded."],"reveals":["Circumscription says: keep the set of abnormal things as small as possible.","It is not the same as assuming every unmentioned fact is false.","Designers choose which predicates to minimize."],"kind":"circ"},{"section":"10.6 Reasoning with Default Information","title":"Closed-World Warning","subtitle":"Unmentioned is not always false","bullets":["No allergy recorded does not prove no allergy exists.","No prior surgery listed may mean records are incomplete.","Hospital AI should distinguish unknown from false."],"reveals":["Closed-world reasoning can be useful in databases but dangerous in medicine.","Absence of evidence is not always evidence of absence.","Use defaults as cautious assumptions, not permanent facts."],"kind":"warning"},{"section":"10.6 Reasoning with Default Information","title":"Truth Maintenance Systems","subtitle":"Track why each conclusion was derived","bullets":["Conclusion: StandardAntibioticOK(Maria).","Justification: no allergy recorded.","New fact: allergy recorded.","System retracts the conclusion and dependent recommendations."],"reveals":["A TMS stores justifications, not just conclusions.","When a justification disappears, dependent beliefs are removed automatically.","This avoids recomputing the entire knowledge base after every update."],"kind":"tms"},{"section":"10.6 Reasoning with Default Information","title":"Proof of Default Retraction","subtitle":"Truth maintenance in action","bullets":["Default: Patient(x) ∧ ¬CriticalAllergy(x) : StandardAntibioticOK(x).","Initial facts: Patient(Maria); NoCriticalAllergy(Maria).","New fact: AllergicTo(Maria, Penicillin) implies CriticalAllergy(Maria)."],"reveals":["Step 1: With Patient(Maria) and no critical allergy, the default fires and the system infers StandardAntibioticOK(Maria).","Step 2: The new allergy fact invalidates the justification; the default’s condition no longer holds.","Conclusion: The truth‑maintenance system retracts StandardAntibioticOK(Maria) and any dependent recommendations."],"kind":"tmsProof"},{"section":"10.6 Reasoning with Default Information","title":"Northgate Conflict Example","subtitle":"When defaults disagree","bullets":["Default 1: Surgical patients normally receive antibiotic A.","Default 2: Penicillin-allergic patients should avoid antibiotic A.","Maria has appendicitis and penicillin allergy.","The system must flag a conflict or choose a safer rule."],"reveals":["This is like the famous Nixon Diamond pattern: two defaults point in different directions.","A good system reports ambiguity instead of silently guessing.","The concepts from this section are the foundation for what follows. Each new tool in Chapter 10 extends the hospital AI's ability to represent a more complete and accurate picture of Northgate General — one that a clinical reasoning system could actually use."],"kind":"conflict"},{"section":"10.5 Reasoning Systems for Categories","title":"Complexity of Description Logic","subtitle":"Why classification is tractable","bullets":["DL classification runs in polynomial time on the knowledge base.","Full first‑order inference is semi‑decidable and may not halt.","Trade‑off: restrict expressiveness for efficient automated reasoning."],"reveals":["Description logic classifiers use specialized algorithms that scale like O(n^k), where n is the size of the knowledge base.","First‑order logic is more expressive but general inference can be undecidable.","Choosing DL lets hospital systems respond quickly without sacrificing needed detail."],"kind":"complexity"},{"section":"10.3 Events and Time","title":"Timeline and Inertia Example","subtitle":"Resource availability through time","bullets":["Before 9am: OR‑3 is available.","9–11am: AppendectomyE1 occupies OR‑3.","After 11am: OR‑3 becomes available again."],"reveals":["The inertia assumption says fluents persist unless an event changes them.","Terminates(Available(OR3),9am) indicates the event makes OR‑3 unavailable.","Initiates(Available(OR3),11am) restores availability; the timeline of Available(OR3) follows automatically."],"kind":"inertiaTimeline"},{"section":"10.4 Mental Objects and Modal Logic","title":"Possible‑Worlds Semantics","subtitle":"Belief and knowledge via accessible worlds","bullets":["Agents reason about a set of possible worlds.","Believes_A(P) is true if P holds in all worlds A considers possible.","Knowledge is belief that is also true in the actual world."],"reveals":["In Kripke semantics, each agent has an accessibility relation linking worlds they consider plausible.","For example, if Dr. Okafor does not know a surgery time changed, his accessible worlds still have it at 9am.","Belief operators are not substitutable: Believes_A(P) does not imply P."],"kind":"kripke"},{"section":"10.6 Reasoning with Default Information","title":"Circumscription Example","subtitle":"Minimizing abnormalities in practice","bullets":["Rule: Patient(x) ∧ ¬Abnormal(x) → SafeAntibiotic(x).","Fact: Patient(Maria) ∧ ¬Abnormal(Maria).","Minimize Abnormal to infer SafeAntibiotic(Maria)."],"reveals":["Circumscription treats abnormal cases explicitly and assumes as few as possible.","If later evidence marks Maria as Abnormal(Penicillin), the minimized abnormal set grows and the conclusion disappears.","This shows how circumscription differs from default logic and closed‑world assumptions."],"kind":"circExample"},{"section":"10.6 Reasoning with Default Information","title":"Truth Maintenance Network","subtitle":"Visualizing justifications and retraction","bullets":["Beliefs form a graph of conclusions and supporting facts.","When a justification node is removed, dependent nodes retract.","Networks avoid recomputing the entire KB on each update."],"reveals":["The top node might be SafeAntibioticOK(Maria).","Its parent justification is the absence of CriticalAllergy(Maria).","When a new allergy fact arrives, the justification node disappears and the network removes the dependent conclusion."],"kind":"tmsNetwork"},{"section":"10.6 Reasoning with Default Information","title":"Nixon Diamond Example","subtitle":"Conflicting defaults outside the hospital","bullets":["Rule 1: Quakers are normally pacifists.","Rule 2: Republicans are normally not pacifists.","Fact: Nixon is both a Quaker and a Republican."],"reveals":["Default 1 suggests Pacifist(Nixon); Default 2 suggests ¬Pacifist(Nixon).","The defaults conflict because their conditions are satisfied simultaneously.","This classic example shows why conflict detection and careful prioritization are essential."],"kind":"nixon"},{"section":"Wrap-Up","title":"How the Six Sections Connect","subtitle":"One hospital case, six representation tools","bullets":["Ontology defines the vocabulary.","Categories organize objects.","Events handle time.","Modal logic handles knowledge and belief.","Reasoners classify efficiently.","Defaults handle normal assumptions and exceptions."],"reveals":["The sections are not separate tricks; they are layers of one knowledge system.","A hospital AI needs all six to support safe scheduling, treatment, and alerts.","The Northgate example shows how one case can touch every layer."],"kind":"stack"},{"section":"Wrap-Up","title":"Full Northgate Reasoning Chain","subtitle":"From facts to action","bullets":["Maria is a Patient.","Maria is diagnosed with appendicitis.","AppendectomyE1 happens in OR-3 from 9am to 11am.","OR-3 is unavailable during that interval.","Maria has penicillin allergy.","Default antibiotic recommendation is blocked."],"reveals":["This chain combines category reasoning, event reasoning, and default reasoning.","No single fact is enough; the useful conclusion comes from connecting facts.","Knowledge representation is the bridge between data and intelligent action."],"kind":"reasoning"},{"section":"Wrap-Up","title":"Common Mistake Review","subtitle":"Five errors novice students should avoid","bullets":["Maria is not a category; Patient is.","PartOf is not SubsetOf.","Believes(P) does not mean P is true.","Available(OR3) must be reinitiated after it is terminated.","No recorded allergy is not the same as no allergy."],"reveals":["These mistakes are conceptually small but cause major reasoning errors.","Ask: individual, category, part, event, fluent, belief, or default?","When stuck, translate the formula back into plain English."],"kind":"warning"},{"section":"Wrap-Up","title":"Final Practice","subtitle":"Apply the same pattern to a new hospital scenario","bullets":["Create C, R, and P for a patient admitted for pneumonia.","Write Member and Subset facts for the care team.","Represent a CT scan event with Happens, Initiates, and Terminates.","Add a default rule and then an exception that retracts it."],"reveals":["Practice is the best way to learn Chapter 10.","Use the Northgate slides as templates, then change the patient, procedure, room, and exception.","Final takeaway: representation decides what an AI can reason about."],"kind":"practice"}];

const flowLabels=["Opening","10.1","10.2","10.3","10.4","10.5","10.6","Wrap-Up"];
const flowSections=["Opening","10.1 Ontological Engineering","10.2 Categories and Objects",
  "10.3 Events and Time","10.4 Mental Objects and Modal Logic",
  "10.5 Reasoning Systems for Categories","10.6 Reasoning with Default Information","Wrap-Up"];
const el=id=>document.getElementById(id);
let idx=0,revealed=0;
function sectionIdx(s){
  const i=flowSections.indexOf(s);
  if(i>=0)return i;
  return flowSections.findIndex(f=>s.startsWith(f.split(" ")[0]));
}
// Map each section to the index of its first slide for quick jumps
const sectionFirstIndex={};
slides.forEach((s,i)=>{if(sectionFirstIndex[s.section]===undefined)sectionFirstIndex[s.section]=i;});
// Jump directly to the first slide of a section when a flow label is clicked
function jumpFlow(i){
  const sec=flowSections[i];
  const first=sectionFirstIndex[sec];
  if(first!==undefined){idx=first;revealed=0;render();}
}
function getVis(kind){return VISUALS[kind]||VISUALS["hospital"];}
function render(){
  const s=slides[idx];
  el("secLabel").textContent=s.section;
  el("slideTitle").textContent=s.title;
  el("slideSub").textContent=s.subtitle;
  el("slideBullets").innerHTML=s.bullets.map(b=>`<li>${b}</li>`).join("");
  el("snippets").innerHTML=s.reveals.map((r,i)=>
    `<div class="snippet sn-${i%3} ${i<revealed?"show":""}">${r}</div>`
  ).join("");
  el("visWrap").innerHTML=getVis(s.kind);
  el("counter").textContent=`${idx+1} / ${slides.length}`;
  el("bar").style.width=((idx+1)/slides.length*100)+"%";
  const rem=s.reveals.length-revealed;
  el("hint").textContent=rem>0
    ?`${rem} reveal${rem>1?"s":""} remaining — click anywhere`
    :idx<slides.length-1?"Click or Next → to advance":"End of presentation";
  const si=sectionIdx(s.section);
  el("flow").innerHTML=flowLabels.map((lbl,i)=>{
    const cls=i===si?"active":(i<si?"done":"");
    // attach onclick handler to allow jumping to section
    return `<span class="fl ${cls}" onclick="jumpFlow(${i})">${lbl}</span>${i<flowLabels.length-1?'<span class="sep">›</span>':""}`;
  }).join("");
  if(revealed===0)el("slideLeft").scrollTop=0;
}
function revealOrNext(){
  const s=slides[idx];
  if(revealed<s.reveals.length){
    revealed++;render();
    const snips=el("snippets").querySelectorAll(".snippet.show");
    if(snips.length)snips[snips.length-1].scrollIntoView({block:"nearest",behavior:"smooth"});
  } else if(idx<slides.length-1){idx++;revealed=0;render();}
}
function back(){
  if(revealed>0){revealed=0;render();}
  else if(idx>0){idx--;revealed=slides[idx].reveals.length;render();}
}
function reset(){revealed=0;render();}
function handleClick(e){
  if(e.target.closest("button")||e.target.closest(".overlay"))return;
  revealOrNext();
}
function openMenu(){
  el("jumpGrid").innerHTML=slides.map((s,i)=>
    `<button class="jump-btn" onclick="go(${i})">${i+1}. ${s.title}<small>${s.section}</small></button>`
  ).join("");
  el("overlay").style.display="flex";
}
function closeMenu(){el("overlay").style.display="none";}
function go(i){idx=i;revealed=0;closeMenu();render();}
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key===" "||e.key==="Enter"){e.preventDefault();revealOrNext();}
  if(e.key==="ArrowLeft"){e.preventDefault();back();}
  if(e.key==="Escape")closeMenu();
});
let tx=0;
document.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
document.addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50){dx<0?revealOrNext():back();}
},{passive:true});
render();
</script></body></html>
