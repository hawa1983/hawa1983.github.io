<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">

<title>Chapter 10 · Knowledge Representation · CS650</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0a1628;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
:root{
  --navy:#1A3A5C;--slate:#4A6FA5;--amber:#C8840A;--green:#1B6B3A;
  --red:#B5311A;--teal:#0F6E56;--purple:#5B3FA6;
}
.deck{height:100dvh;display:grid;
  grid-template-rows:4px 5px 36px 1fr 56px;
  grid-template-areas:"topbar" "prog" "flow" "main" "nav";}
.topbar{grid-area:topbar;background:linear-gradient(90deg,#1A3A5C,#0F6E56,#C8840A)}
.prog-wrap{grid-area:prog;background:rgba(255,255,255,.08)}
#bar{display:block;height:100%;background:var(--amber);width:0;transition:width .3s ease}
.flow{grid-area:flow;display:flex;align-items:center;justify-content:center;
  gap:4px;padding:0 12px;background:rgba(0,0,0,.3);
  border-bottom:1px solid rgba(255,255,255,.08);overflow:hidden;}
.flow .fl{font-size:11px;font-weight:700;color:rgba(255,255,255,.35);
  border:1px solid rgba(255,255,255,.08);border-radius:20px;
  padding:2px 8px;white-space:nowrap;transition:all .2s;}
.flow .fl.active{background:rgba(200,132,10,.25);border-color:rgba(200,132,10,.6);color:#FFD485}
.flow .fl.done{color:rgba(255,255,255,.2)}
.flow .sep{color:rgba(255,255,255,.12);font-size:10px}
.main-area{grid-area:main;display:grid;grid-template-columns:55% 45%;
  gap:0;overflow:hidden;cursor:pointer;
  user-select:none;-webkit-user-select:none;}
.slide-left{display:flex;flex-direction:column;justify-content:center;
  padding:clamp(14px,2.8vh,32px) clamp(16px,3vw,40px);
  border-right:1px solid rgba(255,255,255,.06);overflow-y:auto;}
.slide-left::-webkit-scrollbar{width:4px}
.slide-left::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.slide-right{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:clamp(12px,2.2vh,24px) clamp(14px,2.5vw,30px);
  background:rgba(255,255,255,.025);overflow-y:auto;}
.slide-right::-webkit-scrollbar{width:4px}
.slide-right::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.sec-label{font-size:clamp(9px,.85vw,11px);font-weight:800;letter-spacing:.14em;
  text-transform:uppercase;color:var(--amber);margin-bottom:clamp(5px,.8vh,10px);}
.slide-title{font-size:clamp(20px,2.8vw,40px);font-weight:700;color:#fff;
  line-height:1.1;margin-bottom:clamp(4px,.7vh,9px);}
.slide-sub{font-size:clamp(12px,1.3vw,17px);color:rgba(255,255,255,.45);
  margin-bottom:clamp(8px,1.5vh,18px);line-height:1.4;}
.bullets{list-style:none;display:flex;flex-direction:column;gap:clamp(5px,.7vh,9px);
  margin-bottom:clamp(8px,1.2vh,16px);}
.bullets li{display:flex;gap:9px;align-items:flex-start;
  font-size:clamp(12px,1.25vw,17px);color:rgba(255,255,255,.78);line-height:1.42;}
.bullets li::before{content:"›";color:var(--amber);font-weight:700;flex-shrink:0;font-size:1.1em}
.snippets-area{display:flex;flex-direction:column;gap:clamp(6px,.9vh,10px);margin-top:clamp(6px,1vh,12px);}
.snippet{border-radius:9px;padding:clamp(8px,1.1vh,13px) clamp(11px,1.4vw,15px);
  font-size:clamp(11px,1.1vw,14px);line-height:1.55;
  opacity:0;transform:translateY(10px);
  transition:opacity .35s ease,transform .35s ease;pointer-events:none;border-left:3px solid;}
.snippet.show{opacity:1;transform:none;pointer-events:auto}
.sn-0{background:rgba(200,132,10,.12);border-color:var(--amber);color:#FFD485}
.sn-1{background:rgba(74,111,165,.12);border-color:var(--slate);color:#A8C8E8}
.sn-2{background:rgba(15,110,86,.12);border-color:var(--teal);color:#9FCC9F}
.vis-wrap{width:100%;display:flex;align-items:center;justify-content:center}
.vis-hospital{display:flex;flex-direction:column;gap:9px;width:100%}
.vis-badge{background:rgba(255,255,255,.06);border-radius:7px;padding:7px 11px;
  font-size:12px;font-weight:700;color:#A8C8E8;text-align:center;}
.vis-cards{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.vc{border-radius:9px;padding:9px 10px;text-align:center;border:1px solid}
.vc-blue{background:rgba(74,111,165,.15);border-color:rgba(74,111,165,.4)}
.vc-navy{background:rgba(26,58,92,.4);border-color:rgba(74,111,165,.3)}
.vc-teal{background:rgba(15,110,86,.15);border-color:rgba(15,110,86,.4)}
.vc-amber{background:rgba(200,132,10,.15);border-color:rgba(200,132,10,.4)}
.vc-ico{font-size:18px;margin-bottom:3px}
.vc-name{font-size:10px;font-weight:700;color:#fff}
.vc-role{font-size:9px;color:rgba(255,255,255,.4)}
.vis-event{background:rgba(15,110,86,.2);border:1px solid rgba(15,110,86,.5);
  border-radius:7px;padding:7px 10px;font-size:11px;color:#7FD4B8;
  text-align:center;font-weight:600}
.vis-tree{display:flex;flex-direction:column;align-items:center;gap:3px;width:100%}
.vrow{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;width:100%}
.vbranch{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:50px}
.vline{width:1px;min-height:12px;background:rgba(255,255,255,.18)}
.vdivider{width:80%;height:1px;background:rgba(255,255,255,.1);margin:7px 0}
.vnode{border-radius:7px;padding:7px 10px;text-align:center;
  font-size:clamp(10px,.95vw,13px);font-weight:600;border:1px solid;width:100%;line-height:1.3}
.vnode small{font-weight:400;opacity:.6;font-size:.85em}
.vn-purple{background:rgba(91,63,166,.2);border-color:rgba(109,95,188,.6);color:#C8B8FF}
.vn-blue{background:rgba(74,111,165,.2);border-color:rgba(74,111,165,.6);color:#7EC8F4}
.vn-teal{background:rgba(15,110,86,.2);border-color:rgba(15,110,86,.6);color:#7FD4B8}
.vn-amber{background:rgba(200,132,10,.15);border-color:rgba(200,132,10,.5);color:#FFD485}
.vn-green{background:rgba(27,107,58,.15);border-color:rgba(27,107,58,.5);color:#9FCC9F}
.vn-red{background:rgba(181,49,26,.15);border-color:rgba(181,49,26,.5);color:#F4A080}
.vn-muted{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12);color:rgba(255,255,255,.45)}
.vtag{display:inline-block;border-radius:10px;padding:2px 8px;
  font-size:clamp(9px,.8vw,11px);font-weight:600;margin:2px;border:1px solid}
.vtag-blue{background:rgba(74,111,165,.2);border-color:rgba(74,111,165,.4);color:#7EC8F4}
.vtag-teal{background:rgba(15,110,86,.15);border-color:rgba(15,110,86,.4);color:#7FD4B8}
.vtag-amber{background:rgba(200,132,10,.15);border-color:rgba(200,132,10,.4);color:#FFD485}
.vtag-green{background:rgba(27,107,58,.15);border-color:rgba(27,107,58,.4);color:#9FCC9F}
.vtag-red{background:rgba(181,49,26,.15);border-color:rgba(181,49,26,.4);color:#F4A080}
.vtag-muted{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);color:rgba(255,255,255,.38)}
.vis-tag-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.vis-stack{display:flex;flex-direction:column;gap:5px;width:100%}
.vs-item{border-radius:6px;padding:7px 11px;font-size:clamp(10px,.9vw,12px);
  font-weight:600;color:rgba(255,255,255,.75);border:1px solid}
.vis-code{background:#071828;border-radius:9px;padding:clamp(9px,1.3vh,14px) clamp(11px,1.3vw,15px);
  font-family:"Courier New",monospace;font-size:clamp(10px,.9vw,13px);
  line-height:1.68;color:#C0D8F0;white-space:pre;overflow-x:auto;width:100%}
.vis-code .cm{color:#3E6A8A}.vis-code .ck{color:#7EC8F4}.vis-code .co{color:#F2A623}
.vis-code .ce{color:#E87C5A}.vis-code .cv{color:#9FCC9F}.ct{color:#C8B8FF;font-weight:700}
.vis-allen{display:flex;flex-direction:column;gap:5px;width:100%}
.al-row{display:flex;align-items:center;gap:9px}
.al-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.45);min-width:58px}
.al-bars{flex:1;height:12px;position:relative;display:flex;align-items:center}
.al-b{height:9px;border-radius:3px;position:relative}
.b-blue{background:rgba(74,111,165,.65)}.b-green{background:rgba(27,107,58,.65)}
.b-amber{background:rgba(200,132,10,.3)}
.nav{grid-area:nav;display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(10px,2vw,24px);background:rgba(0,0,0,.4);
  border-top:1px solid rgba(255,255,255,.08);z-index:10;}
.nb{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);
  color:#fff;border-radius:6px;padding:clamp(5px,.9vh,8px) clamp(9px,1.3vw,16px);
  font-size:clamp(11px,.95vw,13px);font-weight:700;cursor:pointer;transition:background .15s;white-space:nowrap;}
.nb:hover{background:rgba(255,255,255,.18)}
.nb-primary{background:rgba(200,132,10,.28);border-color:rgba(200,132,10,.55);color:#FFD485}
.nb-primary:hover{background:rgba(200,132,10,.42)}
.nav-mid{text-align:center}
.nav-counter{font-size:clamp(11px,.95vw,13px);font-weight:700;color:rgba(255,255,255,.55)}
.nav-hint{font-size:clamp(9px,.8vw,11px);color:rgba(255,255,255,.28);margin-top:1px}
.overlay{position:fixed;inset:0;background:rgba(5,15,30,.88);display:none;
  align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(8px)}
.menu-box{background:#0f2035;border:1px solid rgba(255,255,255,.12);border-radius:16px;
  padding:22px;width:min(860px,90vw);max-height:84vh;overflow-y:auto}
.menu-box h2{color:#fff;margin-bottom:14px;font-size:18px}
.menu-box::-webkit-scrollbar{width:4px}
.menu-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:2px}
.jump-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:7px}
.jump-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
  border-radius:8px;padding:9px 11px;text-align:left;cursor:pointer;
  color:rgba(255,255,255,.65);font-size:11px;font-weight:600;transition:background .15s}
.jump-btn:hover{background:rgba(200,132,10,.18);border-color:rgba(200,132,10,.4);color:#FFD485}
.jump-btn small{display:block;color:rgba(255,255,255,.3);font-weight:400;margin-top:2px;font-size:10px}
@media(max-width:680px){
  .main-area{grid-template-columns:1fr;grid-template-rows:auto auto}
  .slide-right{border-top:1px solid rgba(255,255,255,.06);min-height:160px}
  .slide-left{padding:10px 14px} .slide-right{padding:10px 14px}
}
@media(max-height:580px){
  .deck{grid-template-rows:3px 4px 26px 1fr 46px}
  .slide-title{font-size:clamp(17px,2.5vw,30px)}
}

/*
 * Additional responsive tweaks for very small screens.
 * When the viewport width is narrow, stack navigation buttons and
 * allow the section flow bar to wrap or scroll horizontally.
 */
@media(max-width:480px){
  /* Allow flow labels to wrap and scroll */
  .flow{flex-wrap:wrap;justify-content:flex-start;overflow-x:auto}
  .flow .sep{display:none}
  /* Stack nav buttons vertically and expand to full width */
  .nav{flex-direction:column;align-items:stretch;gap:6px;padding:8px 12px}
  .nav > div{display:flex;flex-wrap:wrap;gap:6px}
  .nav button.nb{width:100%;flex:1;margin:2px 0}
  .nav-mid{margin-top:6px;text-align:left}
  /* Reduce padding on slides for small screens */
  .slide-left,.slide-right{padding:8px 12px}
  /* Ensure the menu box uses the full width minus margin */
  .menu-box{width:min(600px,95vw)}
}
</style>
</head>
<body>
<div class="deck">
  <div class="topbar"></div>
  <div class="prog-wrap"><span id="bar"></span></div>
  <div class="flow" id="flow"></div>
  <div class="main-area" id="mainArea" onclick="handleClick(event)">
    <div class="slide-left" id="slideLeft">
      <div class="sec-label" id="secLabel"></div>
      <div class="slide-title" id="slideTitle"></div>
      <div class="slide-sub" id="slideSub"></div>
      <ul class="bullets" id="slideBullets"></ul>
      <div class="snippets-area" id="snippets"></div>
    </div>
    <div class="slide-right" id="slideRight">
      <div class="vis-wrap" id="visWrap"></div>
    </div>
  </div>
  <footer class="nav">
    <button class="nb" onclick="event.stopPropagation();back()">← Back</button>
    <div style="display:flex;gap:7px">
      <button class="nb" onclick="event.stopPropagation();reset()" title="Reset reveals">↺ Reset</button>
      <button class="nb" onclick="event.stopPropagation();openMenu()">≡ Contents</button>
    </div>
    <div class="nav-mid">
      <div class="nav-counter" id="counter">1 / 60</div>
      <div class="nav-hint" id="hint">Click slide to reveal</div>
    </div>
    <button class="nb nb-primary" onclick="event.stopPropagation();revealOrNext()">Reveal / Next →</button>
  </footer>
</div>
<div class="overlay" id="overlay" onclick="closeMenu()">
  <div class="menu-box" onclick="event.stopPropagation()">
    <h2>📋 Jump to a slide</h2>
    <div class="jump-grid" id="jumpGrid"></div>
  </div>
</div>
<script>
const VISUALS={"hospital":"<div class=\"vis-hospital\"><div class=\"vis-badge\">\ud83c\udfe5 Northgate General Hospital</div><div class=\"vis-cards\"><div class=\"vc vc-blue\"><div class=\"vc-ico\">\ud83d\udc69\u200d\ud83e\uddb1</div><div class=\"vc-name\">Maria Santos</div><div class=\"vc-role\">Patient, 34</div></div><div class=\"vc vc-navy\"><div class=\"vc-ico\">\ud83e\uddd1\u200d\u2695\ufe0f</div><div class=\"vc-name\">Dr James Okafor</div><div class=\"vc-role\">Surgeon</div></div><div class=\"vc vc-teal\"><div class=\"vc-ico\">\ud83d\udc69\u200d\u2695\ufe0f</div><div class=\"vc-name\">Nurse Priya Mehta</div><div class=\"vc-role\">Care Nurse</div></div><div class=\"vc vc-amber\"><div class=\"vc-ico\">\ud83c\udfe8</div><div class=\"vc-name\">OR-3</div><div class=\"vc-role\">Operating Room</div></div></div><div class=\"vis-event\">\ud83d\udcc5 Appendectomy &nbsp;\u00b7&nbsp; 14 March &nbsp;\u00b7&nbsp; 9am \u2013 11am</div></div>",
"ontology":"<div class=\"vis-tree\"><div class=\"vnode vn-purple\">O = (C, R, P)</div><div class=\"vrow\" style=\"margin-top:10px\"><div class=\"vbranch\"><div class=\"vline\"></div><div class=\"vnode vn-blue\">C \u2014 Concepts<br><small>Patient \u00b7 Doctor \u00b7 Room</small></div></div><div class=\"vbranch\"><div class=\"vline\"></div><div class=\"vnode vn-teal\">R \u2014 Relations<br><small>TreatedBy \u00b7 AssignedTo</small></div></div><div class=\"vbranch\"><div class=\"vline\"></div><div class=\"vnode vn-amber\">P \u2014 Properties<br><small>Age \u00b7 BloodType \u00b7 Capacity</small></div></div></div></div>",
"triple":"<div class=\"vis-code\"><span class=\"ct\">O = (C, R, P)</span>\n\n<span class=\"ck\">C:</span> Patient, Doctor, Room, Medication\n\n<span class=\"ck\">R:</span> TreatedBy(Maria, DrOkafor)\n   PerformedIn(E1, OR3)\n\n<span class=\"ck\">P:</span> Age(Maria) = 34\n   BloodType(Maria) = \"O+\"\n   Capacity(OR3) = 1</div>",
"category":"<div class=\"vis-tree\"><div class=\"vnode vn-blue\">Category: Patients</div><div class=\"vline\"></div><div class=\"vis-tag-row\"><span class=\"vtag vtag-teal\">Maria \u2208 Patients</span><span class=\"vtag vtag-muted\">other patients...</span></div><div style=\"margin-top:14px;font-size:11px;color:rgba(255,255,255,.4);text-align:center\">The <em>category</em> has no blood type.<br>Individual patients do.</div></div>",
"relations":"<div class=\"vis-code\"><span class=\"ck\">TreatedBy</span>(Maria, DrOkafor)\n<span class=\"ck\">AssignedTo</span>(Maria, Room14)\n<span class=\"ck\">PerformedIn</span>(E1, OR3)\n<span class=\"ck\">DiagnosedWith</span>(Maria, Appendicitis)\n<span class=\"ck\">AdministeredBy</span>(Dose1, NursePriya)\n\n<span class=\"cm\">// Like labelled lines in a diagram</span></div>",
"properties":"<div class=\"vis-code\"><span class=\"cm\">// Individual attributes</span>\n<span class=\"ck\">Age</span>(Maria) = 34\n<span class=\"ck\">BloodType</span>(Maria) = \"O+\"\n<span class=\"ck\">Specialty</span>(DrOkafor) = \"Surgery\"\n<span class=\"ck\">Capacity</span>(OR3) = 1\n<span class=\"ck\">IsAvailable</span>(OR3) = <span class=\"ce\">false</span>\n<span class=\"cm\">// during surgery</span></div>",
"upper":"<div class=\"vis-tree\"><div class=\"vnode vn-purple\">Everything</div><div class=\"vrow\" style=\"margin-top:10px\"><div class=\"vbranch\"><div class=\"vline\"></div><div class=\"vnode vn-blue\" style=\"font-size:11px\">Abstract Objects<br><small>Numbers \u00b7 Sets</small></div></div><div class=\"vbranch\"><div class=\"vline\"></div><div class=\"vnode vn-teal\" style=\"font-size:11px\">Events<br><small>Surgery \u00b7 Match</small></div></div><div class=\"vbranch\"><div class=\"vline\"></div><div class=\"vnode vn-amber\" style=\"font-size:11px\">Things<br><small>Agents \u00b7 Stuff</small></div></div></div><div style=\"margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;justify-content:center\"><span class=\"vtag vtag-amber\">Doctor \u2192 Agent</span><span class=\"vtag vtag-teal\">Surgery \u2192 Event</span><span class=\"vtag vtag-blue\">Morphine \u2192 Stuff</span></div></div>",
"map":"<div class=\"vis-tree\"><div class=\"vnode vn-muted\" style=\"font-size:11px\">Raw Data</div><div class=\"vline\"></div><div class=\"vnode vn-blue\" style=\"font-size:11px\">Organised Knowledge Base</div><div class=\"vline\"></div><div class=\"vnode vn-green\" style=\"font-size:11px\">Safe Intelligent Action</div><div style=\"margin-top:12px;font-size:11px;color:rgba(255,255,255,.35);text-align:center\">Representation is the bridge<br>between data and intelligence</div></div>",

"dl":"<div class=\"vis-code\"><span class=\"cm\">// Description Logic</span>\n<span class=\"cv\">InPatient</span> \u2261 <span class=\"ck\">Patient</span> \u2293 \u2203<span class=\"ck\">hasRoom</span>.<span class=\"ck\">Room</span>\n\n<span class=\"cm\">// Read: InPatient = Patient AND</span>\n<span class=\"cm\">// has at least one Room</span>\n\n<span class=\"cm\">// Reasoner checks:</span>\n<span class=\"cm\">// Is InPatient \u2286 Patient? \u2192 Yes \u2713</span>\n<span class=\"cm\">// Is Maria an InPatient? \u2192 Check ABox</span></div>",
"tbox":"<div class=\"vis-code\"><span class=\"cm\">// TBox \u2014 rule book (written once)</span>\n<span class=\"cv\">InPatient</span> \u2261 <span class=\"ck\">Patient</span> \u2293 \u2203hasRoom.Room\n\n<span class=\"cm\">// ABox \u2014 records (filled in per person)</span>\n<span class=\"ck\">Patient</span>(Maria)\n<span class=\"ck\">hasRoom</span>(Maria, Room14)\n\n<span class=\"cm\">// Auto-derived \u2713</span>\n<span class=\"cv\">\u22a2 InPatient</span>(Maria)\n<span class=\"cm\">// daily rounds triggered</span></div>",
"subsumption":"<div class=\"vis-tree\"><div class=\"vnode vn-teal\" style=\"font-size:11px\">InPatient<br><small>Patient \u2293 \u2203hasRoom</small></div><div class=\"vtag vtag-muted\" style=\"margin:5px auto;display:table;font-size:10px\">subsumed by (\u2286)</div><div class=\"vnode vn-blue\" style=\"font-size:11px\">Patient</div><div style=\"margin-top:10px;font-size:10px;color:rgba(255,255,255,.35);text-align:center\">Guaranteed by definition alone.<br>Verified in polynomial time.</div></div>",
"defaults":"<div class=\"vis-tree\"><div class=\"vnode vn-blue\" style=\"font-size:11px\">Normal assumption<br><small>No critical allergy recorded</small></div><div class=\"vline\"></div><div class=\"vtag vtag-amber\" style=\"margin:0 auto;display:table\">unless exception</div><div class=\"vline\"></div><div class=\"vnode vn-green\" style=\"font-size:11px\">Conclusion: StandardAntibioticOK(Maria)</div><div class=\"vline\"></div><div class=\"vnode vn-red\" style=\"font-size:11px\">Exception: AllergicTo(Maria, Penicillin)</div><div class=\"vline\"></div><div class=\"vtag vtag-red\" style=\"margin:0 auto;display:table\">conclusion retracted \u2717</div></div>",
"nonmono":"<div class=\"vis-code\"><span class=\"cm\">// Classical logic (monotonic)</span>\n<span class=\"ce\">Cannot retract</span> conclusions\n\n<span class=\"cm\">// Default reasoning (non-monotonic)</span>\n<span class=\"cv\">Can retract</span> when new facts arrive\n\n<span class=\"cm\">// Northgate:</span>\n\u22a2 NoKnownAllergy(Maria)  <span class=\"cm\">\u2190 default</span>\n\n<span class=\"ck\">AllergicTo</span>(Maria, Penicillin) added\n\n<span class=\"cv\">\u22a2 NoKnownAllergy(Maria) RETRACTED</span></div>",
"defaultlogic":"<div class=\"vis-code\"><span class=\"cm\">// Reiter's notation: P : J / C</span>\n\n<span class=\"ck\">Patient</span>(x) : <span class=\"cv\">\u00acCriticalAllergy</span>(x)\n             / <span class=\"cv\">\u00acCriticalAllergy</span>(x)\n\n<span class=\"cm\">// New fact arrives:</span>\n<span class=\"ce\">AllergicTo</span>(Maria, Penicillin)\n\n<span class=\"cm\">// Consistency check FAILS</span>\n<span class=\"ce\">// \u2192 default blocked \u2717</span></div>",
"circ":"<div class=\"vis-code\"><span class=\"cm\">// Circumscription</span>\n<span class=\"cm\">// Minimise Abnormal(x)</span>\n\n<span class=\"ck\">Patient</span>(x) \u2227 \u00ac<span class=\"ce\">Abnormal</span>(x)\n  \u2192 <span class=\"cv\">\u00acCriticalAllergy</span>(x)\n\n<span class=\"cm\">// When allergy found:</span>\n<span class=\"ce\">Abnormal</span>(Maria) \u2190 set true\n\n<span class=\"cm\">// Default no longer applies.</span>\n<span class=\"cm\">// CWA \u2260 Circumscription</span></div>",
"tms":"<div class=\"vis-tree\"><div class=\"vnode vn-green\" style=\"font-size:11px\">StandardAntibioticOK(Maria)</div><div class=\"vtag vtag-muted\" style=\"margin:4px auto;display:table;font-size:10px\">justified by</div><div class=\"vnode vn-blue\" style=\"font-size:11px\">\u00acAllergicTo(Maria, Penicillin)</div><div class=\"vline\"></div><div class=\"vnode vn-red\" style=\"font-size:11px\">AllergicTo(Maria, Penicillin) \u2190 added</div><div class=\"vline\"></div><div class=\"vtag vtag-red\" style=\"margin:0 auto;display:table\">Justification gone \u2192 Conclusion retracted \u2717</div></div>",
"practice":"<div class=\"vis-tree\"><div class=\"vnode vn-amber\" style=\"font-size:11px\">New case: pneumonia patient</div><div style=\"display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:10px\"><span class=\"vtag vtag-blue\">Ontology C,R,P</span><span class=\"vtag vtag-blue\">Member + Subset</span><span class=\"vtag vtag-teal\">Happens CT scan</span><span class=\"vtag vtag-teal\">Initiates / Terminates</span><span class=\"vtag vtag-amber\">Default rule</span><span class=\"vtag vtag-red\">Exception that retracts it</span></div></div>",
"warning":"<div class=\"vnode vn-red\" style=\"padding:20px;text-align:center\"><div style=\"font-size:28px;margin-bottom:10px\">\u26a0\ufe0f</div><strong style=\"font-size:13px;color:#F4A080\">Common Mistake Alert</strong><br><br><span style=\"font-size:11px;color:#C8DCF0;line-height:1.6\">Translate every formula<br>back into plain English<br>before answering.</span></div>"};
const slides=[{"section": "Opening", "title": "Chapter 10: Knowledge Representation", "subtitle": "Teaching a computer what the hospital world looks like", "bullets": ["Knowledge representation is how an AI stores facts so it can reason with them.", "Northgate General Hospital will be our single running example.", "Click anywhere to reveal explanation snippets before moving on."], "reveals": ["In this chapter, the main question is not “Can the AI calculate?” but “What does the AI know, and how is that knowledge organized?”", "Novice shortcut: think of a knowledge base as a library. Representation is the catalog system that makes the library usable.", "Hospital anchor: Maria, Dr. Okafor, Nurse Priya, OR-3, appendectomy, medications, allergies, schedules, and reports."], "kind": "hospital"}, {"section": "Opening", "title": "Learning Goals", "subtitle": "What students should be able to do by the end", "bullets": ["Explain ontology, category, object, event, belief, semantic network, description logic, and default reasoning.", "Write small hospital examples using Member, Subset, PartOf, Happens, Initiates, and Terminates.", "Explain why an AI sometimes must retract earlier conclusions."], "reveals": ["Goal 1 is vocabulary. Students need plain-English meanings before formal notation.", "Goal 2 is transfer. They should apply the same idea to a new hospital fact, not just repeat a definition.", "Goal 3 is safety. Hospital AI must update conclusions when new facts arrive, such as allergy information."], "kind": "map"}, {"section": "Opening", "title": "Northgate General Hospital", "subtitle": "The running story for every slide", "bullets": ["Maria Santos is a 34-year-old patient.", "Dr. James Okafor is the surgeon.", "Nurse Priya Mehta assists care.", "OR-3 is the operating room.", "Appendectomy occurs March 14, 9am to 11am."], "reveals": ["We use one story so students can focus on the AI concept instead of learning a new example every slide.", "The same facts will be represented in different ways: as categories, events, beliefs, networks, and defaults.", "This mirrors real hospital systems: patient records, scheduling, clinical rules, and safety alerts must work together."], "kind": "hospital"}, {"section": "Opening", "title": "Why Representation Matters", "subtitle": "Facts are not useful until the AI can use them", "bullets": ["Raw fact: “Maria has appendicitis.”", "Structured fact: DiagnosedWith(Maria, Appendicitis).", "Reasoned conclusion: Maria needs a procedure, room, staff, and schedule."], "reveals": ["A sentence in English is understandable to humans, but an AI needs structure to connect it with other facts.", "Once structured, the AI can answer questions it was never directly programmed to answer.", "Hospital example: if Dr. Okafor is a surgeon and surgeons are doctors, the system can infer he has doctor permissions."], "kind": "reasoning"}, {"section": "Opening", "title": "Chapter 10 as Six Layers", "subtitle": "A staircase from vocabulary to flexible reasoning", "bullets": ["10.1 Ontological engineering", "10.2 Categories and objects", "10.3 Events and time", "10.4 Mental objects and modal logic", "10.5 Reasoning systems for categories", "10.6 Reasoning with default information"], "reveals": ["Layer 1 asks: What kinds of things exist?", "Layer 2 asks: How do individuals fit into groups?", "Layer 3 asks: How do facts change over time?", "Layer 4 asks: What do agents know or believe?", "Layer 5 asks: How can category reasoning be efficient?", "Layer 6 asks: How do we reason when normal assumptions later change?"], "kind": "stack"}, {"section": "Opening", "title": "Notation Survival Kit", "subtitle": "Read the logic like short hospital sentences", "bullets": ["Member(Maria, Patients): Maria is in the Patients category.", "Subset(Surgeons, Doctors): every surgeon is a doctor.", "PartOf(Blade, Scalpel7): the blade is a component of Scalpel7.", "Happens(SurgeryE1, 9am, 11am): an event occurred during an interval."], "reveals": ["Do not let symbols scare you. Each formula is just a compressed sentence.", "Member connects one individual to one category. Subset connects one category to a larger category.", "Transition: next we move from Opening to 10.1 Ontological Engineering. The hospital example stays the same, but the representation tool changes."], "kind": "notation"}, {"section": "10.1 Ontological Engineering", "title": "What Is an Ontology?", "subtitle": "A formal map of what exists and how it connects", "bullets": ["An ontology defines the important kinds of things in a domain.", "It names relationships among those things.", "It gives the AI a shared vocabulary for reasoning."], "reveals": ["Every hospital uses words like patient, doctor, room, procedure, medication, and allergy.", "The ontology says which of those are categories, which are relationships, and which are properties.", "Without an ontology, the AI has a pile of facts instead of a usable knowledge system."], "kind": "ontology"}, {"section": "10.1 Ontological Engineering", "title": "The Ontology Triple: O = (C, R, P)", "subtitle": "Concepts, relations, and properties", "bullets": ["C = Concepts: Patient, Doctor, Room, Medication.", "R = Relations: TreatedBy, AssignedTo, PerformedIn.", "P = Properties: age, blood type, capacity, availability."], "reveals": ["Concepts are category types. They answer “What kind of thing is this?”", "Relations connect two or more things. They answer “How are these things linked?”", "Properties describe attributes of individuals. They answer “What value does this thing have?”"], "kind": "triple"}, {"section": "10.1 Ontological Engineering", "title": "Concepts at Northgate", "subtitle": "The main categories in the hospital world", "bullets": ["Patient", "Doctor", "Nurse", "OperatingRoom", "Medication", "Procedure", "Condition"], "reveals": ["Maria is not a concept; she is an individual instance of Patient.", "Appendicitis can be represented as a Condition concept, with Maria linked to it by DiagnosedWith.", "Concepts let the AI apply one rule to many individuals."], "kind": "category"}, {"section": "10.1 Ontological Engineering", "title": "Relations at Northgate", "subtitle": "Named links between things", "bullets": ["TreatedBy(Maria, DrOkafor)", "AssignedTo(Maria, Room14)", "PerformedIn(AppendectomyE1, OR3)", "AdministeredBy(MorphineDose1, NursePriya)"], "reveals": ["A relation is like a labeled line between boxes in a diagram.", "Relations make queries possible: “Who treats Maria?” or “Where did the procedure occur?”", "Good relation names prevent ambiguity. TreatedBy is not the same as AssignedTo."], "kind": "relations"}, {"section": "10.1 Ontological Engineering", "title": "Properties at Northgate", "subtitle": "Attributes of individual things", "bullets": ["Age(Maria) = 34", "BloodType(Maria) = O+", "Capacity(OR3) = 1", "IsAvailable(OR3) = false during surgery"], "reveals": ["Properties usually attach a value to an individual.", "A category such as Patients does not have one blood type. Individual patients do.", "Some properties are stable; others change over time and become fluents later in the chapter."], "kind": "properties"}, {"section": "10.1 Ontological Engineering", "title": "Upper Ontology", "subtitle": "The master filing system", "bullets": ["Everything can be organized under very general branches.", "Examples: Abstract Objects, Events, Things, Agents, Stuff.", "Hospital-specific concepts hang below these general ideas."], "reveals": ["Doctor is a kind of Agent because doctors can act.", "AppendectomyE1 is an Event because it happens over time.", "Morphine is Stuff because portions of morphine are still morphine."], "kind": "upper"}, {"section": "10.1 Ontological Engineering", "title": "Upper vs. Domain Ontology", "subtitle": "General skeleton vs. hospital-specific vocabulary", "bullets": ["Upper ontology: Object, Event, Agent, Time.", "Hospital domain ontology: Patient, Surgeon, OR, Medication, Allergy.", "Both are needed for reusable AI knowledge."], "reveals": ["Upper ontology helps different systems share a basic structure.", "Domain ontology adds the specialized detail needed for medicine.", "Appendicitis belongs in the medical domain ontology, not the top-level upper ontology."], "kind": "upper"}, {"section": "10.1 Ontological Engineering", "title": "Build the Northgate Triple", "subtitle": "A first complete representation", "bullets": ["C = {Patient, Doctor, Nurse, OperatingRoom, Procedure, Condition}.", "R = {TreatedBy, DiagnosedWith, PerformedIn, AssignedTo}.", "P = {Age, BloodType, Specialty, Capacity, Availability}."], "reveals": ["The ontology separates structure from facts.", "Define TreatedBy once, then use it for every patient-doctor pair.", "Transition: next we move from 10.1 Ontological Engineering to 10.2 Categories and Objects. The hospital example stays the same, but the representation tool changes."], "kind": "triple"}, {"section": "10.2 Categories and Objects", "title": "Categories vs. Individual Objects", "subtitle": "Group type is not the same as a specific thing", "bullets": ["Patient is a category.", "Maria is an individual object.", "OperatingRoom is a category.", "OR-3 is an individual room."], "reveals": ["A category can contain many members.", "An individual is one specific item in the world.", "Do not say the Patients category has Maria’s blood type. Maria has the blood type."], "kind": "category"}, {"section": "10.2 Categories and Objects", "title": "Member vs. Subset", "subtitle": "Two forms of belonging", "bullets": ["Member(Maria, Patients): individual to category.", "Subset(Surgeons, Doctors): category to larger category.", "They are not interchangeable."], "reveals": ["Member answers: “Is this specific object in this group?”", "Subset answers: “Is every member of this smaller group also in the bigger group?”", "Wrong example: Subset(Maria, Patients) treats Maria like a category."], "kind": "member"}, {"section": "10.2 Categories and Objects", "title": "Inheritance", "subtitle": "Properties flow down category chains", "bullets": ["Subset(Surgeons, Doctors).", "Subset(Doctors, MedicalStaff).", "MedicalStaff follow infection-control protocols.", "Therefore surgeons follow them too."], "reveals": ["Inheritance prevents repetitive data entry.", "A rule written for MedicalStaff automatically applies to doctors, surgeons, and nurses if they are subcategories.", "Hospital benefit: fewer missing rules and more consistent safety checks."], "kind": "inheritance"}, {"section": "10.2 Categories and Objects", "title": "Northgate Inference Chain", "subtitle": "How the AI derives a new fact", "bullets": ["Member(DrOkafor, Surgeons).", "Subset(Surgeons, Doctors).", "For all doctors: HasPrescriptionRights(x).", "Conclusion: HasPrescriptionRights(DrOkafor)."], "reveals": ["The conclusion was not typed directly into the system.", "It follows from category membership plus a general rule.", "This is the power of representing knowledge at the category level."], "kind": "reasoning"}, {"section": "10.2 Categories and Objects", "title": "Partitions", "subtitle": "Cleanly slicing a parent category", "bullets": ["Disjoint: no overlap among child categories.", "Exhaustive: every parent member is covered.", "Partition: disjoint and exhaustive together."], "reveals": ["Example: Patients, MedicalStaff, and AdminStaff might partition HospitalPersonnel.", "If the partition is valid, Dr. Okafor being MedicalStaff means he is not a Patient.", "Partitions help the AI detect contradictions and missing classifications."], "kind": "partition"}, {"section": "10.2 Categories and Objects", "title": "Disjoint Is Not Enough", "subtitle": "No overlap, but maybe missing people", "bullets": ["Doctors and Nurses can be disjoint.", "That does not cover AdminStaff.", "The parent category may still have unclassified members."], "reveals": ["Disjoint means no one can be in two selected categories at the same time.", "It does not guarantee every person is assigned somewhere.", "For hospital records, missing groups can create reporting gaps."], "kind": "partition"}, {"section": "10.2 Categories and Objects", "title": "Exhaustive Is Not Enough", "subtitle": "Everyone covered, but overlap may remain", "bullets": ["MedicalStaff and AdminStaff may cover all workers.", "But a nurse manager might fit both.", "That is exhaustive but not disjoint."], "reveals": ["Exhaustive means every member appears in at least one child category.", "It does not prevent double membership.", "If the hospital needs exactly one billing category, it needs a partition, not just exhaustive coverage."], "kind": "partition"}, {"section": "10.2 Categories and Objects", "title": "Things vs. Stuff", "subtitle": "The cut-it-in-half test", "bullets": ["Scalpel: a Thing. Cut it in half and it is not two scalpels.", "Morphine: Stuff. Divide it and each portion is still morphine.", "Things are counted; stuff is measured."], "reveals": ["Things usually use count words: one scalpel, three syringes.", "Stuff usually uses units: 50 ml morphine, 200 ml saline.", "This matters for inventory and dosage reasoning."], "kind": "stuff"}, {"section": "10.2 Categories and Objects", "title": "PartOf", "subtitle": "Physical component, not category membership", "bullets": ["PartOf(Blade, Scalpel7).", "PartOf(Scalpel7, SurgicalKit3).", "Therefore PartOf(Blade, SurgicalKit3)."], "reveals": ["PartOf is often transitive: part of a part can be part of the whole.", "PartOf is not SubsetOf. A blade is not a smaller category inside scalpel.", "Hospital example: a scalpel is part of a kit, but Surgeons are a subset of Doctors."], "kind": "partof"}, {"section": "10.2 Categories and Objects", "title": "Category Is Not a Composite Object", "subtitle": "Avoid a common beginner mistake", "bullets": ["Patients is a category.", "Maria is an individual patient.", "The hospital patient list is a collection record.", "These are three different things."], "reveals": ["A category describes what counts as a patient.", "A collection lists current patients.", "Transition: next we move from 10.2 Categories and Objects to 10.3 Events and Time. The hospital example stays the same, but the representation tool changes."], "kind": "warning"}, {"section": "10.3 Events and Time", "title": "Why Events Matter", "subtitle": "The hospital world is a movie, not a photo", "bullets": ["OR-3 changes from available to occupied.", "Maria changes from pre-op to in-surgery to recovery.", "Nurse assignments change by shift."], "reveals": ["Earlier sections describe what things are. Events describe what happens.", "An AI scheduler cannot reason from a timeless snapshot.", "It must know when a fact started, when it ended, and whether it still holds."], "kind": "event"}, {"section": "10.3 Events and Time", "title": "Fluents", "subtitle": "Facts that can change over time", "bullets": ["Available(OR3)", "OccupiedBy(OR3, Maria)", "InRecovery(Maria)", "OnCall(DrOkafor)"], "reveals": ["A fluent is a property whose truth can vary over time.", "Available(OR3) is true before surgery and false during surgery.", "Fluents are central to event calculus."], "kind": "fluent"}, {"section": "10.3 Events and Time", "title": "Happens(event, start, end)", "subtitle": "Representing an event interval", "bullets": ["Happens(AppendectomyE1, 9am, 11am).", "The event is not just a label; it occupies time.", "The AI can compare this interval with other bookings."], "reveals": ["Happens says the event occurred over a time interval.", "The event can later receive more facts: surgeon, patient, room, duration.", "This avoids treating surgery as an instant moment."], "kind": "timeline"}, {"section": "10.3 Events and Time", "title": "Initiates", "subtitle": "An event turns a fluent on", "bullets": ["Initiates(SurgeryStart, OccupiedBy(OR3, Maria), 9am).", "Initiates(SurgeryEnd, InRecovery(Maria), 11am).", "A single event can initiate several fluents."], "reveals": ["Initiates means a property becomes true at a time.", "At 9am, the room becomes occupied by Maria.", "At 11am, Maria’s recovery status becomes true."], "kind": "event"}, {"section": "10.3 Events and Time", "title": "Terminates", "subtitle": "An event turns a fluent off", "bullets": ["Terminates(SurgeryStart, Available(OR3), 9am).", "Terminates(SurgeryEnd, InSurgery(Maria), 11am).", "Termination prevents outdated facts from staying true."], "reveals": ["Terminates means a property stops being true at a time.", "Starting surgery both terminates Available(OR3) and initiates OccupiedBy(OR3, Maria).", "One event can turn one fluent off while turning another on."], "kind": "event"}, {"section": "10.3 Events and Time", "title": "T(fluent, t1, t2)", "subtitle": "A fluent holds continuously across an interval", "bullets": ["T(OccupiedBy(OR3, Maria), 9am, 11am).", "T(InSurgery(Maria), 9am, 11am).", "T(Available(OR3), 11:30am, 1pm) only if it was reinitiated."], "reveals": ["T is useful for questions like “Was OR-3 occupied at 10am?”", "It summarizes continuity, not just start and end points.", "Schedulers use this idea to detect conflicts."], "kind": "timeline"}, {"section": "10.3 Events and Time", "title": "Inertia Assumption", "subtitle": "Facts persist until changed", "bullets": ["If OR-3 becomes occupied at 9am, it stays occupied until an event changes it.", "If Maria enters recovery at 11am, she remains in recovery until discharged or transferred.", "The AI does not need a new fact for every minute."], "reveals": ["Inertia is common-sense persistence.", "It prevents the system from forgetting facts immediately after they are asserted.", "But it also means we must explicitly add events that change important states."], "kind": "fluent"}, {"section": "10.3 Events and Time", "title": "Can OR-3 Be Booked at 10am?", "subtitle": "A conflict-detection example", "bullets": ["AppendectomyE1 happens 9am-11am.", "OR-3 is occupied during that interval.", "A proposed 10am surgery overlaps.", "Conclusion: reject the booking."], "reveals": ["The AI uses time intervals, not human intuition.", "The proposed event overlaps the existing event and needs the same room.", "Event calculus turns scheduling into formal reasoning."], "kind": "conflict"}, {"section": "10.3 Events and Time", "title": "Allen Interval Relations", "subtitle": "Eight ways two events can relate", "bullets": ["Before", "After", "Meets", "Overlaps", "During", "Starts", "Finishes", "Equals"], "reveals": ["Every pair of time intervals fits one of these relationships.", "Hospital example: ward round meets surgery if one ends exactly when the other begins.", "Anesthesia may overlap surgery because it starts earlier and ends later."], "kind": "allen"}, {"section": "10.3 Events and Time", "title": "Reification", "subtitle": "Turning an event into an object", "bullets": ["AppendectomyE1 becomes a thing the AI can describe.", "Patient(AppendectomyE1, Maria).", "Surgeon(AppendectomyE1, DrOkafor).", "Room(AppendectomyE1, OR3)."], "reveals": ["Reification lets us attach details to an event.", "Instead of writing one huge relation with many arguments, we create an event object and link facts to it.", "Transition: next we move from 10.3 Events and Time to 10.4 Mental Objects and Modal Logic. The hospital example stays the same, but the representation tool changes."], "kind": "reify"}, {"section": "10.4 Mental Objects and Modal Logic", "title": "Why Beliefs Need Special Handling", "subtitle": "People and systems can represent claims internally", "bullets": ["Dr. Okafor may believe a lab report is final.", "Nurse Priya may know Maria is allergic to penicillin.", "The scheduling AI may believe OR-3 is available."], "reveals": ["A hospital AI must distinguish the world from what an agent believes about the world.", "Beliefs can be false. Knowledge requires truth.", "This matters when reports are preliminary, mislabeled, or incomplete."], "kind": "mental"}, {"section": "10.4 Mental Objects and Modal Logic", "title": "Knowledge vs. Belief", "subtitle": "Factive vs. not factive", "bullets": ["Knows(Agent, P) implies P is true.", "Believes(Agent, P) does not imply P is true.", "A justified false belief is still not knowledge."], "reveals": ["Knowledge is often treated as justified true belief.", "If the allergy record is wrong, the system believed it; it did not know it.", "Hospital safety systems should track evidence, not just conclusions."], "kind": "belief"}, {"section": "10.4 Mental Objects and Modal Logic", "title": "Referential Opacity", "subtitle": "Names cannot always be swapped inside belief contexts", "bullets": ["Maria Santos and Patient4471 may refer to the same person.", "Dr. Okafor may know Patient4471 needs surgery.", "That does not mean he knows “Maria Santos” needs surgery."], "reveals": ["Outside belief contexts, equal names can often be substituted.", "Inside Knows() or Believes(), substitution can fail because the agent may not know the identity connection.", "This is referential opacity."], "kind": "opacity"}, {"section": "10.4 Mental Objects and Modal Logic", "title": "Possible Worlds Intuition", "subtitle": "Knowledge narrows what worlds are possible", "bullets": ["If Nurse Priya knows Maria is in OR-3, worlds where Maria is elsewhere are ruled out.", "If she merely suspects it, multiple worlds remain possible.", "Modal logic formalizes this idea."], "reveals": ["Think of possible worlds as alternative ways the hospital could be.", "Knowledge removes alternatives that contradict known facts.", "Belief may rank or select worlds without guaranteeing truth."], "kind": "worlds"}, {"section": "10.4 Mental Objects and Modal Logic", "title": "Modal Operators", "subtitle": "Logic about modes such as knowledge, possibility, and time", "bullets": ["K_a P: agent a knows P.", "B_a P: agent a believes P.", "F P: P will eventually be true.", "G P: P is always true."], "reveals": ["Modal logic adds operators around statements.", "This lets the AI talk about claims, time, necessity, possibility, knowledge, and belief.", "The tradeoff: richer expression can make reasoning harder."], "kind": "modal"}, {"section": "10.4 Mental Objects and Modal Logic", "title": "Logical Omniscience Problem", "subtitle": "Real agents do not know all consequences of what they know", "bullets": ["If an ideal logical agent knows the rules, it knows all conclusions.", "Humans and hospital systems have limited time and computation.", "So real belief systems are often incomplete."], "reveals": ["Logical omniscience is useful mathematically but unrealistic practically.", "A hospital AI may have enough facts to derive a conclusion but may not derive it instantly.", "Designers must decide what inferences are required for safe operation."], "kind": "warning"}, {"section": "10.4 Mental Objects and Modal Logic", "title": "Hospital Safety Lesson", "subtitle": "Track who knows what, when, and from which source", "bullets": ["The surgeon may not know the allergy update yet.", "The pharmacy system may know it.", "The care team needs shared, updated knowledge."], "reveals": ["Modal reasoning can represent gaps between systems and people.", "A safety alert is partly a knowledge-transfer problem.", "Transition: next we move from 10.4 Mental Objects and Modal Logic to 10.5 Reasoning Systems for Categories. The hospital example stays the same, but the representation tool changes."], "kind": "hospital"}, {"section": "10.5 Reasoning Systems for Categories", "title": "Why Specialized Reasoners?", "subtitle": "Full first-order logic can be too expensive", "bullets": ["Hospitals have thousands of categories and millions of facts.", "The AI needs fast category reasoning.", "Specialized systems trade some expressiveness for efficiency."], "reveals": ["Chapter 10 introduces semantic networks and description logics.", "Both focus on categories, membership, and inheritance.", "This is practical because many everyday questions are category questions."], "kind": "reasoner"}, {"section": "10.5 Reasoning Systems for Categories", "title": "Semantic Networks", "subtitle": "A graph of objects, categories, and links", "bullets": ["Nodes represent objects or categories.", "Links represent relations like MemberOf, SubsetOf, PartOf, or TreatedBy.", "Inheritance follows links through the graph."], "reveals": ["Semantic networks are visually intuitive for beginners.", "They make “follow the arrows” reasoning easy to see.", "Hospital example: DrOkafor -> Surgeons -> Doctors -> MedicalStaff."], "kind": "network"}, {"section": "10.5 Reasoning Systems for Categories", "title": "Northgate Staff Hierarchy", "subtitle": "A semantic network example", "bullets": ["MemberOf(DrOkafor, Surgeons).", "SubsetOf(Surgeons, Doctors).", "SubsetOf(Doctors, MedicalStaff).", "SubsetOf(MedicalStaff, HospitalPersonnel)."], "reveals": ["The network stores both individual facts and category structure.", "To answer “Is Dr. Okafor hospital personnel?” the reasoner follows category links upward.", "This is faster and clearer than rechecking every rule manually."], "kind": "hierarchy"}, {"section": "10.5 Reasoning Systems for Categories", "title": "Multiple Inheritance", "subtitle": "One object or category can inherit from more than one parent", "bullets": ["A NursePractitioner may be both NursingStaff and PrescribingClinicians.", "A ResidentSurgeon may be both Trainee and Surgeon.", "Conflicts can arise if parents provide different defaults."], "reveals": ["Multiple inheritance is powerful but risky.", "If one parent says “can prescribe” and another says “requires supervision,” the system must combine or resolve them.", "Default reasoning in Section 10.6 helps with exceptions."], "kind": "inheritance"}, {"section": "10.5 Reasoning Systems for Categories", "title": "Limits of Semantic Networks", "subtitle": "Easy pictures can hide formal problems", "bullets": ["Links usually express binary relations.", "Negation and disjunction are harder.", "N-ary relations often require reification."], "reveals": ["A flight-like event such as surgery with patient, surgeon, room, and time is more than binary.", "Reifying SurgeryE1 solves this by creating an event object with separate links.", "The more expressive the network becomes, the closer it gets to full logic and its complexity."], "kind": "warning"}, {"section": "10.5 Reasoning Systems for Categories", "title": "Description Logics", "subtitle": "A formal language for category definitions", "bullets": ["Defines categories precisely.", "Supports efficient classification.", "Used in ontology languages and biomedical knowledge systems."], "reveals": ["Description logic is less pictorial than semantic networks but more formally controlled.", "It is designed for reasoning about classes and relationships.", "It asks questions such as: Is every InPatient also a Patient?"], "kind": "dl"}, {"section": "10.5 Reasoning Systems for Categories", "title": "TBox and ABox", "subtitle": "Rules plus records", "bullets": ["TBox: InPatient = Patient with an assigned room.", "ABox: Patient(Maria); hasRoom(Maria, Room14).", "Reasoner derives: InPatient(Maria)."], "reveals": ["TBox is the terminology box: category definitions.", "ABox is the assertion box: facts about individuals.", "Together, they let the AI classify individual cases automatically."], "kind": "tbox"}, {"section": "10.5 Reasoning Systems for Categories", "title": "Subsumption and Classification", "subtitle": "Checking category containment", "bullets": ["Subsumption: Is category A always inside category B?", "Example: InPatient is subsumed by Patient.", "Classification: place individuals into the right categories."], "reveals": ["Subsumption checks definitions, not just current examples.", "If InPatient is defined as Patient with a room, then every InPatient is a Patient by definition.", "Transition: next we move from 10.5 Reasoning Systems for Categories to 10.6 Reasoning with Default Information. The hospital example stays the same, but the representation tool changes."], "kind": "subsumption"}, {"section": "10.5 Reasoning Systems for Categories", "title": "Worked Example: Classifying InPatient(Maria)", "subtitle": "Step-by-step derivation with TBox and ABox", "bullets": ["TBox: InPatient = Patient with an assigned room.", "ABox: Patient(Maria); hasRoom(Maria, Room14).", "Goal: prove Member(Maria, InPatient)."], "reveals": ["Step 1: Check the definition: InPatient(x) ↔ Patient(x) ∧ hasRoom(x,y).", "Step 2: The ABox tells us Patient(Maria) and hasRoom(Maria, Room14).", "Conclusion: Maria satisfies the definition, so the reasoner infers Member(Maria, InPatient)."], "kind": "classification"}, {"section": "10.6 Reasoning with Default Information", "title": "Why Defaults Are Needed", "subtitle": "Real knowledge is often normal-but-not-always", "bullets": ["Most scheduled surgeries use the assigned OR.", "Most patients have no critical allergy recorded.", "Most staff follow standard access rules."], "reveals": ["Defaults let the AI make useful assumptions without pretending they are guaranteed.", "Hospitals need defaults because waiting for perfect information can delay action.", "But defaults must be retractable when exceptions appear."], "kind": "defaults"}, {"section": "10.6 Reasoning with Default Information", "title": "Monotonic vs. Non-Monotonic", "subtitle": "Can conclusions be withdrawn?", "bullets": ["Monotonic reasoning only adds conclusions.", "Non-monotonic reasoning can retract conclusions.", "Default reasoning is non-monotonic."], "reveals": ["In classical logic, adding facts does not remove old conclusions.", "In real hospitals, new facts can change what is reasonable to conclude.", "Example: “no known allergy” is withdrawn when a penicillin allergy is recorded."], "kind": "nonmono"}, {"section": "10.6 Reasoning with Default Information", "title": "Default Logic", "subtitle": "If consistent, conclude", "bullets": ["Default: if patient has no recorded allergy, assume standard antibiotic is allowed.", "New fact: AllergicTo(Maria, Penicillin).", "The default no longer applies."], "reveals": ["A default rule fires only when it does not contradict known facts.", "This prevents the system from concluding both “safe” and “unsafe” for the same drug.", "Defaults are useful but must be carefully scoped."], "kind": "defaultlogic"}, {"section": "10.6 Reasoning with Default Information", "title": "Canonical Example: Birds and Penguins", "subtitle": "Default vs exception reasoning", "bullets": ["Default: Birds normally fly.", "Exception: Penguins are birds that do not fly.", "Facts: Bird(Tweety); Penguin(Tweety)."], "reveals": ["Step 1: From Bird(Tweety), the default rule suggests Fly(Tweety).", "Step 2: Because Tweety is a penguin, the exception ¬Fly(Tweety) overrides the default.", "Conclusion: Non‑monotonic reasoning retracts Fly(Tweety) and concludes ¬Fly(Tweety)."], "kind": "birdDefault"}, {"section": "10.6 Reasoning with Default Information", "title": "Circumscription", "subtitle": "Assume abnormalities are minimal", "bullets": ["Represent unusual cases with Abnormal(x).", "Assume patients are normal unless evidence marks an abnormal case.", "Maria becomes abnormal for penicillin if allergy is recorded."], "reveals": ["Circumscription says: keep the set of abnormal things as small as possible.", "It is not the same as assuming every unmentioned fact is false.", "Designers choose which predicates to minimize."], "kind": "circ"}, {"section": "10.6 Reasoning with Default Information", "title": "Closed-World Warning", "subtitle": "Unmentioned is not always false", "bullets": ["No allergy recorded does not prove no allergy exists.", "No prior surgery listed may mean records are incomplete.", "Hospital AI should distinguish unknown from false."], "reveals": ["Closed-world reasoning can be useful in databases but dangerous in medicine.", "Absence of evidence is not always evidence of absence.", "Use defaults as cautious assumptions, not permanent facts."], "kind": "warning"}, {"section": "10.6 Reasoning with Default Information", "title": "Truth Maintenance Systems", "subtitle": "Track why each conclusion was derived", "bullets": ["Conclusion: StandardAntibioticOK(Maria).", "Justification: no allergy recorded.", "New fact: allergy recorded.", "System retracts the conclusion and dependent recommendations."], "reveals": ["A TMS stores justifications, not just conclusions.", "When a justification disappears, dependent beliefs are removed automatically.", "This avoids recomputing the entire knowledge base after every update."], "kind": "tms"}, {"section": "10.6 Reasoning with Default Information", "title": "Proof of Default Retraction", "subtitle": "Truth maintenance in action", "bullets": ["Default: Patient(x) ∧ ¬CriticalAllergy(x) : StandardAntibioticOK(x).", "Initial facts: Patient(Maria); NoCriticalAllergy(Maria).", "New fact: AllergicTo(Maria, Penicillin) implies CriticalAllergy(Maria)."], "reveals": ["Step 1: With Patient(Maria) and no critical allergy, the default fires and the system infers StandardAntibioticOK(Maria).", "Step 2: The new allergy fact invalidates the justification; the default’s condition no longer holds.", "Conclusion: The truth‑maintenance system retracts StandardAntibioticOK(Maria) and any dependent recommendations."], "kind": "tmsProof"}, {"section": "10.6 Reasoning with Default Information", "title": "Northgate Conflict Example", "subtitle": "When defaults disagree", "bullets": ["Default 1: Surgical patients normally receive antibiotic A.", "Default 2: Penicillin-allergic patients should avoid antibiotic A.", "Maria has appendicitis and penicillin allergy.", "The system must flag a conflict or choose a safer rule."], "reveals": ["This is like the famous Nixon Diamond pattern: two defaults point in different directions.", "A good system reports ambiguity instead of silently guessing.", "Transition: next we move from 10.6 Reasoning with Default Information to Wrap-Up. The hospital example stays the same, but the representation tool changes."], "kind": "conflict"}, {"section": "10.5 Reasoning Systems for Categories", "title": "Complexity of Description Logic", "subtitle": "Why classification is tractable", "bullets": ["DL classification runs in polynomial time on the knowledge base.", "Full first‑order inference is semi‑decidable and may not halt.", "Trade‑off: restrict expressiveness for efficient automated reasoning."], "reveals": ["Description logic classifiers use specialized algorithms that scale like O(n^k), where n is the size of the knowledge base.", "First‑order logic is more expressive but general inference can be undecidable.", "Choosing DL lets hospital systems respond quickly without sacrificing needed detail."], "kind": "complexity"},{"section": "10.3 Events and Time", "title": "Timeline and Inertia Example", "subtitle": "Resource availability through time", "bullets": ["Before 9am: OR‑3 is available.", "9–11am: AppendectomyE1 occupies OR‑3.", "After 11am: OR‑3 becomes available again."], "reveals": ["The inertia assumption says fluents persist unless an event changes them.", "Terminates(Available(OR3),9am) indicates the event makes OR‑3 unavailable.", "Initiates(Available(OR3),11am) restores availability; the timeline of Available(OR3) follows automatically."], "kind": "inertiaTimeline"},{"section": "10.4 Mental Objects and Modal Logic", "title": "Possible‑Worlds Semantics", "subtitle": "Belief and knowledge via accessible worlds", "bullets": ["Agents reason about a set of possible worlds.", "Believes_A(P) is true if P holds in all worlds A considers possible.", "Knowledge is belief that is also true in the actual world."], "reveals": ["In Kripke semantics, each agent has an accessibility relation linking worlds they consider plausible.", "For example, if Dr. Okafor does not know a surgery time changed, his accessible worlds still have it at 9am.", "Belief operators are not substitutable: Believes_A(P) does not imply P."], "kind": "kripke"},{"section": "10.6 Reasoning with Default Information", "title": "Circumscription Example", "subtitle": "Minimizing abnormalities in practice", "bullets": ["Rule: Patient(x) ∧ ¬Abnormal(x) → SafeAntibiotic(x).", "Fact: Patient(Maria) ∧ ¬Abnormal(Maria).", "Minimize Abnormal to infer SafeAntibiotic(Maria)."], "reveals": ["Circumscription treats abnormal cases explicitly and assumes as few as possible.", "If later evidence marks Maria as Abnormal(Penicillin), the minimized abnormal set grows and the conclusion disappears.", "This shows how circumscription differs from default logic and closed‑world assumptions."], "kind": "circExample"},{"section": "10.6 Reasoning with Default Information", "title": "Truth Maintenance Network", "subtitle": "Visualizing justifications and retraction", "bullets": ["Beliefs form a graph of conclusions and supporting facts.", "When a justification node is removed, dependent nodes retract.", "Networks avoid recomputing the entire KB on each update."], "reveals": ["The top node might be SafeAntibioticOK(Maria).", "Its parent justification is the absence of CriticalAllergy(Maria).", "When a new allergy fact arrives, the justification node disappears and the network removes the dependent conclusion."], "kind": "tmsNetwork"},{"section": "10.6 Reasoning with Default Information", "title": "Nixon Diamond Example", "subtitle": "Conflicting defaults outside the hospital", "bullets": ["Rule 1: Quakers are normally pacifists.", "Rule 2: Republicans are normally not pacifists.", "Fact: Nixon is both a Quaker and a Republican."], "reveals": ["Default 1 suggests Pacifist(Nixon); Default 2 suggests ¬Pacifist(Nixon).", "The defaults conflict because their conditions are satisfied simultaneously.", "This classic example shows why conflict detection and careful prioritization are essential."], "kind": "nixon"},{"section": "Wrap-Up", "title": "How the Six Sections Connect", "subtitle": "One hospital case, six representation tools", "bullets": ["Ontology defines the vocabulary.", "Categories organize objects.", "Events handle time.", "Modal logic handles knowledge and belief.", "Reasoners classify efficiently.", "Defaults handle normal assumptions and exceptions."], "reveals": ["The sections are not separate tricks; they are layers of one knowledge system.", "A hospital AI needs all six to support safe scheduling, treatment, and alerts.", "The Northgate example shows how one case can touch every layer."], "kind": "stack"}, {"section": "Wrap-Up", "title": "Full Northgate Reasoning Chain", "subtitle": "From facts to action", "bullets": ["Maria is a Patient.", "Maria is diagnosed with appendicitis.", "AppendectomyE1 happens in OR-3 from 9am to 11am.", "OR-3 is unavailable during that interval.", "Maria has penicillin allergy.", "Default antibiotic recommendation is blocked."], "reveals": ["This chain combines category reasoning, event reasoning, and default reasoning.", "No single fact is enough; the useful conclusion comes from connecting facts.", "Knowledge representation is the bridge between data and intelligent action."], "kind": "reasoning"}, {"section": "Wrap-Up", "title": "Common Mistake Review", "subtitle": "Five errors novice students should avoid", "bullets": ["Maria is not a category; Patient is.", "PartOf is not SubsetOf.", "Believes(P) does not mean P is true.", "Available(OR3) must be reinitiated after it is terminated.", "No recorded allergy is not the same as no allergy."], "reveals": ["These mistakes are conceptually small but cause major reasoning errors.", "Ask: individual, category, part, event, fluent, belief, or default?", "When stuck, translate the formula back into plain English."], "kind": "warning"}, {"section": "Wrap-Up", "title": "Final Practice", "subtitle": "Apply the same pattern to a new hospital scenario", "bullets": ["Create C, R, and P for a patient admitted for pneumonia.", "Write Member and Subset facts for the care team.", "Represent a CT scan event with Happens, Initiates, and Terminates.", "Add a default rule and then an exception that retracts it."], "reveals": ["Practice is the best way to learn Chapter 10.", "Use the Northgate slides as templates, then change the patient, procedure, room, and exception.", "Final takeaway: representation decides what an AI can reason about."], "kind": "practice"}];

const flowLabels=["Opening","10.1","10.2","10.3","10.4","10.5","10.6","Wrap-Up"];
const flowSections=["Opening","10.1 Ontological Engineering","10.2 Categories and Objects",
  "10.3 Events and Time","10.4 Mental Objects and Modal Logic",
  "10.5 Reasoning Systems for Categories","10.6 Reasoning with Default Information","Wrap-Up"];
const el=id=>document.getElementById(id);
let idx=0,revealed=0;
function sectionIdx(s){
  const i=flowSections.indexOf(s);
  if(i>=0)return i;
  return flowSections.findIndex(f=>s.startsWith(f.split(" ")[0]));
}
// Map each section to the index of its first slide for quick jumps
const sectionFirstIndex={};
slides.forEach((s,i)=>{if(sectionFirstIndex[s.section]===undefined)sectionFirstIndex[s.section]=i;});
// Jump directly to the first slide of a section when a flow label is clicked
function jumpFlow(i){
  const sec=flowSections[i];
  const first=sectionFirstIndex[sec];
  if(first!==undefined){idx=first;revealed=0;render();}
}
function getVis(kind){return VISUALS[kind]||VISUALS["hospital"];}
function render(){
  const s=slides[idx];
  el("secLabel").textContent=s.section;
  el("slideTitle").textContent=s.title;
  el("slideSub").textContent=s.subtitle;
  el("slideBullets").innerHTML=s.bullets.map(b=>`<li>${b}</li>`).join("");
  el("snippets").innerHTML=s.reveals.map((r,i)=>
    `<div class="snippet sn-${i%3} ${i<revealed?"show":""}">${r}</div>`
  ).join("");
  el("visWrap").innerHTML=getVis(s.kind);
  el("counter").textContent=`${idx+1} / ${slides.length}`;
  el("bar").style.width=((idx+1)/slides.length*100)+"%";
  const rem=s.reveals.length-revealed;
  el("hint").textContent=rem>0
    ?`${rem} reveal${rem>1?"s":""} remaining — click anywhere`
    :idx<slides.length-1?"Click or Next → to advance":"End of presentation";
  const si=sectionIdx(s.section);
  el("flow").innerHTML=flowLabels.map((lbl,i)=>{
    const cls=i===si?"active":(i<si?"done":"");
    // attach onclick handler to allow jumping to section
    return `<span class="fl ${cls}" onclick="jumpFlow(${i})">${lbl}</span>${i<flowLabels.length-1?'<span class="sep">›</span>':""}`;
  }).join("");
  if(revealed===0)el("slideLeft").scrollTop=0;
}
function revealOrNext(){
  const s=slides[idx];
  if(revealed<s.reveals.length){
    revealed++;render();
    const snips=el("snippets").querySelectorAll(".snippet.show");
    if(snips.length)snips[snips.length-1].scrollIntoView({block:"nearest",behavior:"smooth"});
  } else if(idx<slides.length-1){idx++;revealed=0;render();}
}
function back(){
  if(revealed>0){revealed=0;render();}
  else if(idx>0){idx--;revealed=slides[idx].reveals.length;render();}
}
function reset(){revealed=0;render();}
function handleClick(e){
  if(e.target.closest("button")||e.target.closest(".overlay"))return;
  revealOrNext();
}
function openMenu(){
  el("jumpGrid").innerHTML=slides.map((s,i)=>
    `<button class="jump-btn" onclick="go(${i})">${i+1}. ${s.title}<small>${s.section}</small></button>`
  ).join("");
  el("overlay").style.display="flex";
}
function closeMenu(){el("overlay").style.display="none";}
function go(i){idx=i;revealed=0;closeMenu();render();}
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key===" "||e.key==="Enter"){e.preventDefault();revealOrNext();}
  if(e.key==="ArrowLeft"){e.preventDefault();back();}
  if(e.key==="Escape")closeMenu();
});
let tx=0;
document.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
document.addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50){dx<0?revealOrNext():back();}
},{passive:true});
render();
</script></body></html>
